<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🖥️ 渗透学习平台 - 个人信息点</title>
<style>
/* ===== CRT 基础 ===== */
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    background: #000;
    color: #00ff41;
    font-family: 'Courier New', Courier, monospace;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
}
/* 扫描线 */
body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 9999;
}
/* CRT 屏幕发光 */
body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at center,
        transparent 60%,
        rgba(0,0,0,0.5) 100%
    );
    pointer-events: none;
    z-index: 9998;
}

/* ===== 顶部标题栏 ===== */
.header {
    background: linear-gradient(90deg, #001a00, #002800, #001a00);
    border-bottom: 2px solid #00ff41;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 0 20px rgba(0,255,65,0.2);
    position: relative;
    z-index: 100;
}
.header-title {
    font-size: 18px;
    font-weight: bold;
    color: #00ff41;
    text-shadow: 0 0 10px #00ff41;
    letter-spacing: 2px;
}
.header-sub {
    font-size: 9px;
    color: #005500;
    margin-top: 2px;
    letter-spacing: 1px;
}
.header-right {
    text-align: right;
}
.overall-badge {
    font-size: 11px;
    color: #00ff41;
    background: rgba(0,255,65,0.08);
    border: 1px solid rgba(0,255,65,0.3);
    padding: 4px 12px;
    border-radius: 3px;
}

/* ===== 总进度仪表盘 ===== */
.dashboard {
    padding: 14px 20px 10px;
    background: rgba(0,20,0,0.5);
    border-bottom: 1px solid #003300;
}
.dashboard-title {
    font-size: 10px;
    color: #005500;
    margin-bottom: 8px;
    letter-spacing: 1px;
    text-transform: uppercase;
}
.dash-meters {
    display: flex;
    gap: 12px;
    align-items: center;
}
.dash-meter {
    flex: 1;
}
.dash-meter-label {
    font-size: 8px;
    color: #008800;
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.dash-meter-bar {
    height: 6px;
    background: #001a00;
    border-radius: 3px;
    overflow: hidden;
    border: 1px solid #003300;
}
.dash-meter-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.5s;
}
.dash-meter-val {
    font-size: 8px;
    color: #00aa00;
    margin-top: 2px;
    text-align: right;
}
/* 总体平均仪表 */
.total-meter {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    background: rgba(0,255,65,0.03);
    border: 1px solid #003300;
    border-radius: 4px;
    min-width: 180px;
}
.total-meter-circle {
    width: 48px; height: 48px;
    border-radius: 50%;
    border: 3px solid #003300;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: bold;
    color: #00ff41;
    flex-shrink: 0;
    position: relative;
}
.total-meter-circle svg {
    position: absolute; top: 0; left: 0;
    transform: rotate(-90deg);
}
.total-meter-circle .val {
    position: relative; z-index: 1;
}
.total-meter-info { font-size: 9px; }
.total-meter-info .rank { color: #00ff41; font-size: 11px; }
.total-meter-info .label { color: #005500; margin-top: 2px; }

/* ===== 主内容网格 ===== */
.main-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    padding: 14px 20px;
}
@media (max-width: 700px) {
    .main-grid { grid-template-columns: 1fr; }
}

/* ===== 节点卡片 ===== */
.node-card {
    background: rgba(0,15,0,0.8);
    border: 1px solid #003300;
    border-radius: 6px;
    overflow: hidden;
    transition: border-color 0.3s;
}
.node-card:hover { border-color: #00aa00; }
.node-card.node-complete { border-color: #ff1744; box-shadow: 0 0 10px rgba(255,23,68,0.2); }

.node-header {
    padding: 10px 14px 8px;
    background: rgba(0,255,65,0.04);
    border-bottom: 1px solid #002200;
    display: flex;
    align-items: center;
    gap: 8px;
}
.node-icon {
    font-size: 18px;
    flex-shrink: 0;
}
.node-name {
    font-size: 13px;
    font-weight: bold;
    color: #00ff41;
    text-shadow: 0 0 6px rgba(0,255,65,0.4);
}
.node-sublabel {
    font-size: 8px;
    color: #005500;
    margin-top: 1px;
}
.node-rank {
    margin-left: auto;
    font-size: 9px;
    padding: 2px 8px;
    border-radius: 3px;
    border: 1px solid;
    white-space: nowrap;
}

/* 进度条区域 */
.node-progress-area {
    padding: 10px 14px;
    border-bottom: 1px solid #002200;
}
.progress-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 5px;
}
.progress-pct {
    font-size: 22px;
    font-weight: bold;
    min-width: 52px;
    text-align: right;
    line-height: 1;
}
.progress-bar-wrap {
    flex: 1;
    height: 14px;
    background: #001a00;
    border-radius: 7px;
    overflow: hidden;
    border: 1px solid #003300;
}
.progress-bar-fill {
    height: 100%;
    border-radius: 7px;
    transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
    position: relative;
    overflow: hidden;
}
/* 进度条流光效果 */
.progress-bar-fill::after {
    content: '';
    position: absolute;
    top: 0; right: 0; bottom: 0;
    width: 20px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3));
    animation: shimmer 2s infinite;
}
@keyframes shimmer { 0%,100%{opacity:0} 50%{opacity:1} }

/* 节点按钮 */
.node-btns {
    padding: 8px 14px;
    display: flex;
    gap: 8px;
    border-bottom: 1px solid #002200;
}
.btn-quiz, .btn-sim {
    flex: 1;
    padding: 7px 0;
    border: none;
    border-radius: 4px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: bold;
}
.btn-quiz {
    background: rgba(0,255,65,0.08);
    border: 1px solid rgba(0,255,65,0.3);
    color: #00ff41;
}
.btn-quiz:hover { background: rgba(0,255,65,0.15); box-shadow: 0 0 8px rgba(0,255,65,0.3); }
.btn-sim {
    background: rgba(0,180,255,0.06);
    border: 1px solid rgba(0,180,255,0.3);
    color: #00b4ff;
}
.btn-sim:hover { background: rgba(0,180,255,0.12); box-shadow: 0 0 8px rgba(0,180,255,0.3); }

/* 节点历史 */
.node-history {
    padding: 6px 14px 8px;
    min-height: 50px;
}
.history-item {
    font-size: 8px;
    color: #005500;
    padding: 2px 0;
    border-bottom: 1px solid #001a00;
    display: flex;
    justify-content: space-between;
}
.history-item:last-child { border-bottom: none; }
.history-item .hi-text { color: #006600; }
.history-item .hi-delta { font-weight: bold; }
.history-item .hi-delta.pos { color: #00cc44; }
.history-item .hi-delta.neg { color: #ff4444; }

/* ===== 弹出层：答题面板 ===== */
.overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.9);
    z-index: 1000;
    align-items: center;
    justify-content: center;
}
.overlay.active { display: flex; }

.modal {
    background: #050f05;
    border: 1px solid #00ff41;
    border-radius: 8px;
    padding: 20px;
    width: 90%;
    max-width: 520px;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 0 30px rgba(0,255,65,0.2);
}
.modal-title {
    font-size: 14px;
    color: #00ff41;
    font-weight: bold;
    margin-bottom: 4px;
    text-shadow: 0 0 8px rgba(0,255,65,0.5);
}
.modal-subtitle {
    font-size: 9px;
    color: #005500;
    margin-bottom: 14px;
    letter-spacing: 1px;
}

/* 答题内容 */
.quiz-progress-bar {
    display: flex;
    gap: 4px;
    margin-bottom: 12px;
}
.qpb-dot {
    flex: 1;
    height: 4px;
    border-radius: 2px;
    background: #002200;
    border: 1px solid #003300;
    transition: background 0.3s;
}
.qpb-dot.current { background: #00ff41; }
.qpb-dot.done-correct { background: #00cc44; }
.qpb-dot.done-wrong { background: #ff4444; }

.quiz-question {
    font-size: 12px;
    color: #00cc44;
    line-height: 1.5;
    margin-bottom: 12px;
    padding: 10px;
    background: rgba(0,255,65,0.03);
    border: 1px solid #002200;
    border-radius: 4px;
}
.quiz-q-num {
    font-size: 9px;
    color: #005500;
    margin-bottom: 4px;
}
.quiz-options {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 12px;
}
.quiz-option {
    padding: 8px 12px;
    border: 1px solid #003300;
    border-radius: 4px;
    cursor: pointer;
    font-size: 11px;
    color: #008800;
    background: rgba(0,255,65,0.02);
    transition: all 0.2s;
    position: relative;
}
.quiz-option:hover:not(.disabled) {
    border-color: #00ff41;
    background: rgba(0,255,65,0.06);
    color: #00ff41;
}
.quiz-option.correct {
    border-color: #00ff41;
    background: rgba(0,255,65,0.12);
    color: #00ff41;
    pointer-events: none;
}
.quiz-option.wrong {
    border-color: #ff4444;
    background: rgba(255,68,68,0.08);
    color: #ff6666;
    pointer-events: none;
}
.quiz-option.disabled { pointer-events: none; opacity: 0.6; }
.quiz-feedback {
    font-size: 10px;
    padding: 8px 10px;
    border-radius: 4px;
    margin-bottom: 10px;
}
.quiz-feedback.ok { background: rgba(0,255,65,0.06); border: 1px solid rgba(0,255,65,0.2); color: #00ff41; }
.quiz-feedback.fail { background: rgba(255,68,68,0.06); border: 1px solid rgba(255,68,68,0.2); color: #ff6666; }

/* 答题结束汇总 */
.quiz-summary {
    text-align: center;
    padding: 10px 0;
}
.quiz-summary .score-big {
    font-size: 32px;
    font-weight: bold;
    color: #00ff41;
    text-shadow: 0 0 12px #00ff41;
}
.quiz-summary .score-label {
    font-size: 10px;
    color: #005500;
    margin-top: 4px;
    margin-bottom: 12px;
}
.quiz-summary .progress-delta {
    font-size: 14px;
    font-weight: bold;
    margin-bottom: 8px;
}
.delta-pos { color: #00cc44; }
.delta-neg { color: #ff4444; }

/* ===== 模拟实操终端 ===== */
.terminal {
    background: #000;
    border: 1px solid #003300;
    border-radius: 4px;
    padding: 10px;
    font-size: 10px;
    line-height: 1.6;
    min-height: 120px;
    max-height: 280px;
    overflow-y: auto;
    margin-bottom: 10px;
    font-family: 'Courier New', monospace;
}
.term-line { margin: 1px 0; }
.term-cmd { color: #00ff41; }
.term-cmd::before { content: '$ '; color: #005500; }
.term-out { color: #008800; }
.term-ok { color: #00cc44; }
.term-err { color: #ff6666; }
.term-warn { color: #ffaa00; }
.term-info { color: #00aaff; }
.term-cursor {
    display: inline-block;
    width: 8px; height: 12px;
    background: #00ff41;
    animation: blink 0.8s infinite;
    vertical-align: middle;
}
@keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }

/* 实操步骤选择 */
.sim-steps {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 10px;
}
.sim-step-btn {
    padding: 8px 12px;
    border: 1px solid #003300;
    border-radius: 4px;
    background: rgba(0,180,255,0.03);
    color: #00aacc;
    font-size: 10px;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    text-align: left;
    transition: all 0.2s;
}
.sim-step-btn:hover:not(:disabled) {
    border-color: #00b4ff;
    background: rgba(0,180,255,0.08);
    color: #00d4ff;
}
.sim-step-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.sim-step-btn.done {
    border-color: #006600;
    color: #00aa44;
    background: rgba(0,255,65,0.04);
}

/* 通用按钮 */
.btn-close {
    padding: 7px 18px;
    background: rgba(255,68,68,0.08);
    border: 1px solid rgba(255,68,68,0.3);
    color: #ff6666;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
}
.btn-close:hover { background: rgba(255,68,68,0.15); }
.btn-primary {
    padding: 7px 18px;
    background: rgba(0,255,65,0.08);
    border: 1px solid rgba(0,255,65,0.3);
    color: #00ff41;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
}
.btn-primary:hover { background: rgba(0,255,65,0.15); }
.btn-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 10px; }

/* ===== 全局日志 ===== */
.global-log {
    margin: 0 20px 20px;
    background: rgba(0,10,0,0.8);
    border: 1px solid #002200;
    border-radius: 6px;
    padding: 10px 14px;
}
.log-title {
    font-size: 9px;
    color: #005500;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
    border-bottom: 1px solid #001a00;
    padding-bottom: 4px;
}
.log-entry {
    font-size: 9px;
    color: #004400;
    padding: 2px 0;
    border-bottom: 1px solid #001500;
    display: flex;
    gap: 6px;
}
.log-entry:last-child { border-bottom: none; }
.log-ts { color: #003300; min-width: 55px; }
.log-node { min-width: 70px; color: #005500; }
.log-msg { flex: 1; color: #006600; }
.log-delta { font-weight: bold; }
.log-delta.pos { color: #00aa44; }
.log-delta.neg { color: #ff4444; }

/* ===== 段位颜色 ===== */
.rank-0 { color: #00aa44; border-color: #00aa44; }
.rank-1 { color: #00cc44; border-color: #00cc44; }
.rank-2 { color: #aacc00; border-color: #aacc00; }
.rank-3 { color: #ffaa00; border-color: #ffaa00; }
.rank-4 { color: #ff6600; border-color: #ff6600; }
.rank-5 { color: #ff2200; border-color: #ff2200; }
.rank-6 { color: #ff1744; border-color: #ff1744; box-shadow: 0 0 6px rgba(255,23,68,0.3); }

/* 进度条颜色 */
.pbar-0 { background: linear-gradient(90deg, #003300, #00aa44); }
.pbar-1 { background: linear-gradient(90deg, #004400, #00cc44); }
.pbar-2 { background: linear-gradient(90deg, #445500, #aacc00); }
.pbar-3 { background: linear-gradient(90deg, #553300, #ffaa00); }
.pbar-4 { background: linear-gradient(90deg, #552200, #ff6600); }
.pbar-5 { background: linear-gradient(90deg, #550000, #ff2200); }
.pbar-6 { background: linear-gradient(90deg, #330000, #ff1744); }

/* 进度文字颜色 */
.pct-0 { color: #00aa44; }
.pct-1 { color: #00cc44; }
.pct-2 { color: #aacc00; }
.pct-3 { color: #ffaa00; }
.pct-4 { color: #ff6600; }
.pct-5 { color: #ff2200; }
.pct-6 { color: #ff1744; text-shadow: 0 0 8px rgba(255,23,68,0.5); }

/* 重置按钮 */
.reset-btn {
    padding: 4px 10px;
    background: rgba(255,68,68,0.05);
    border: 1px solid rgba(255,68,68,0.2);
    color: #cc3333;
    font-family: 'Courier New', monospace;
    font-size: 8px;
    cursor: pointer;
    border-radius: 3px;
}
.reset-btn:hover { background: rgba(255,68,68,0.1); }
</style>
</head>
<body>

<!-- 顶部标题栏 -->
<div class="header">
    <div>
        <div class="header-title">🖥️ 渗透学习平台</div>
        <div class="header-sub">PERSONAL HACK TRAINING NODE / 个人信息点</div>
    </div>
    <div class="header-right" id="headerRight">
        <div id="worldServerEntry" style="display:none;margin-bottom:6px;">
            <button onclick="enterWorldServer()" style="padding:5px 14px;background:rgba(0,180,255,0.1);border:1px solid rgba(0,180,255,0.4);color:#00b4ff;font-family:'Courier New',monospace;font-size:11px;cursor:pointer;border-radius:4px;font-weight:bold;">🌐 进入世界服务器</button>
        </div>
        <div class="overall-badge">总进度 <span id="overallPct">0</span>%</div>
    </div>
</div>

<!-- 总进度仪表盘 -->
<div class="dashboard">
    <div class="dashboard-title">▸ 节点总览</div>
    <div class="dash-meters">
        <div class="dash-meter">
            <div class="dash-meter-label">🔥 外层防火墙</div>
            <div class="dash-meter-bar"><div class="dash-meter-fill" id="dm-firewall" style="width:0%"></div></div>
            <div class="dash-meter-val"><span id="dv-firewall">0</span>%</div>
        </div>
        <div class="dash-meter">
            <div class="dash-meter-label">🌐 网关节点</div>
            <div class="dash-meter-bar"><div class="dash-meter-fill" id="dm-gateway" style="width:0%"></div></div>
            <div class="dash-meter-val"><span id="dv-gateway">0</span>%</div>
        </div>
        <div class="dash-meter">
            <div class="dash-meter-label">🗄️ 数据库存</div>
            <div class="dash-meter-bar"><div class="dash-meter-fill" id="dm-database" style="width:0%"></div></div>
            <div class="dash-meter-val"><span id="dv-database">0</span>%</div>
        </div>
        <div class="dash-meter">
            <div class="dash-meter-label">⚙️ 应用/核心系统</div>
            <div class="dash-meter-bar"><div class="dash-meter-fill" id="dm-appcore" style="width:0%"></div></div>
            <div class="dash-meter-val"><span id="dv-appcore">0</span>%</div>
        </div>
        <div style="display:flex;align-items:center;padding-left:10px;">
            <button class="reset-btn" onclick="confirmReset()">⚠ 重置</button>
        </div>
    </div>
</div>

<!-- 4个节点卡片 -->
<div class="main-grid" id="nodesGrid">
    <!-- 由 JS 渲染 -->
</div>

<!-- 全局日志 -->
<div class="global-log">
    <div class="log-title">▸ 学习日志</div>
    <div id="globalLogArea">
        <div class="log-entry"><span class="log-ts">--:--:--</span><span class="log-node">系统</span><span class="log-msg">等待学习操作...</span></div>
    </div>
</div>

<!-- 答题弹出层 -->
<div class="overlay" id="quizOverlay">
    <div class="modal" id="quizModal">
        <div class="modal-title" id="quizModalTitle">📝 答题挑战</div>
        <div class="modal-subtitle" id="quizModalSub">每次随机3题 · 答对+5 · 答错-2</div>
        <div id="quizContent"></div>
    </div>
</div>

<!-- 模拟实操弹出层 -->
<div class="overlay" id="simOverlay">
    <div class="modal" id="simModal">
        <div class="modal-title" id="simModalTitle">💻 模拟实操</div>
        <div class="modal-subtitle" id="simModalSub">按步骤执行操作 · 完成获得进度</div>
        <div id="simContent"></div>
    </div>
</div>

<script>
// ===== 常量 =====
var STORAGE_KEY = 'hackTrainingProgress';

var NODES = [
    { key: 'firewall', name: '外层防火墙',      icon: '🔥', sub: 'OUTER FIREWALL PENETRATION' },
    { key: 'gateway',  name: '网关节点',          icon: '🌐', sub: 'GATEWAY NODE INFILTRATION' },
    { key: 'database', name: '数据库存',          icon: '🗄️', sub: 'DATABASE LAYER EXPLOITATION' },
    { key: 'appcore',  name: '应用服务/核心系统', icon: '⚙️', sub: 'APPLICATION / CORE SYSTEM TAKEOVER' }
];

// ===== 数据存储 =====
function loadData() {
    try {
        var d = localStorage.getItem(STORAGE_KEY);
        if (d) return JSON.parse(d);
    } catch(e) {}
    return {
        nodes: {
            firewall: { progress: 0, history: [] },
            gateway:  { progress: 0, history: [] },
            database: { progress: 0, history: [] },
            appcore:  { progress: 0, history: [] }
        },
        globalLog: []
    };
}

function saveData(data) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}

// ===== 工具函数 =====
function shuffleArr(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
}

function getRank(progress) {
    for (var i = RANKS.length - 1; i >= 0; i--) {
        if (progress >= RANKS[i].min) return RANKS[i];
    }
    return RANKS[0];
}

function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

function now() {
    var d = new Date();
    return ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2)+':'+('0'+d.getSeconds()).slice(-2);
}

function addLog(data, nodeKey, msg, delta) {
    var nodeName = nodeKey ? (NODES.find(function(n){return n.key===nodeKey;}) || {name:'系统'}).name : '系统';
    data.globalLog.unshift({
        ts: now(),
        node: nodeName,
        msg: msg,
        delta: delta
    });
    if (data.globalLog.length > 20) data.globalLog.length = 20;
}

// ===== 渲染 =====
function renderAll() {
    var data = loadData();
    renderDashboard(data);
    renderNodes(data);
    renderGlobalLog(data);
    checkWorldServerUnlock(data);
}

function renderDashboard(data) {
    var total = 0;
    NODES.forEach(function(n) {
        var p = (data.nodes[n.key] || {}).progress || 0;
        total += p;
        var el = document.getElementById('dm-'+n.key);
        var vl = document.getElementById('dv-'+n.key);
        if (el) { el.style.width = p + '%'; el.className = 'dash-meter-fill ' + getRank(p).pbar; }
        if (vl) vl.textContent = p;
    });
    var avg = Math.round(total / NODES.length);
    var el = document.getElementById('overallPct');
    if (el) el.textContent = avg;
}

function renderNodes(data) {
    var grid = document.getElementById('nodesGrid');
    if (!grid) return;
    var html = '';
    NODES.forEach(function(node) {
        var nd = data.nodes[node.key] || { progress: 0, history: [] };
        var p = nd.progress || 0;
        var rank = getRank(p);
        var isComplete = p >= 100;
        html += '<div class="node-card' + (isComplete ? ' node-complete' : '') + '">';
        // 头部
        html += '<div class="node-header">';
        html += '<div class="node-icon">' + node.icon + '</div>';
        html += '<div><div class="node-name">' + node.name + '</div><div class="node-sublabel">' + node.sub + '</div></div>';
        html += '<div class="node-rank ' + rank.cls + '">' + rank.label + '</div>';
        html += '</div>';
        // 进度条
        html += '<div class="node-progress-area">';
        html += '<div class="progress-row">';
        html += '<div class="progress-pct ' + rank.pct + '">' + p + '</div>';
        html += '<div class="progress-bar-wrap"><div class="progress-bar-fill ' + rank.pbar + '" style="width:' + p + '%"></div></div>';
        html += '</div>';
        html += '<div style="font-size:8px;color:#005500;text-align:right">进度 ' + p + ' / 100</div>';
        html += '</div>';
        // 按钮
        html += '<div class="node-btns">';
        html += '<button class="btn-quiz" onclick="openQuiz(\'' + node.key + '\')">📝 答题挑战</button>';
        html += '<button class="btn-sim" onclick="openSim(\'' + node.key + '\')">💻 模拟实操</button>';
        html += '</div>';
        // 历史
        html += '<div class="node-history">';
        var hist = (nd.history || []).slice(0, 3);
        if (hist.length === 0) {
            html += '<div class="history-item"><span class="hi-text" style="color:#003300">暂无学习记录</span></div>';
        } else {
            hist.forEach(function(h) {
                var dCls = h.delta >= 0 ? 'pos' : 'neg';
                var dStr = (h.delta >= 0 ? '+' : '') + h.delta;
                html += '<div class="history-item"><span class="hi-text">' + h.ts + ' ' + h.type + '</span><span class="hi-delta ' + dCls + '">' + dStr + '</span></div>';
            });
        }
        html += '</div>';
        html += '</div>';
    });
    grid.innerHTML = html;
}

function renderGlobalLog(data) {
    var el = document.getElementById('globalLogArea');
    if (!el) return;
    var logs = data.globalLog || [];
    if (logs.length === 0) {
        el.innerHTML = '<div class="log-entry"><span class="log-ts">--:--:--</span><span class="log-node">系统</span><span class="log-msg">等待学习操作...</span></div>';
        return;
    }
    el.innerHTML = logs.map(function(l) {
        var dStr = (l.delta !== undefined && l.delta !== null) ? ((l.delta >= 0 ? '+' : '') + l.delta) : '';
        var dCls = l.delta > 0 ? 'pos' : (l.delta < 0 ? 'neg' : '');
        return '<div class="log-entry"><span class="log-ts">' + l.ts + '</span><span class="log-node">' + l.node + '</span><span class="log-msg">' + l.msg + '</span>' +
            (dStr ? '<span class="log-delta ' + dCls + '">' + dStr + '</span>' : '') + '</div>';
    }).join('');
}

// ===== 更新进度 =====
function updateProgress(nodeKey, delta, histType) {
    var data = loadData();
    var nd = data.nodes[nodeKey] || { progress: 0, history: [] };
    var oldP = nd.progress || 0;
    var newP = clamp(oldP + delta, 0, 100);
    nd.progress = newP;
    nd.history = nd.history || [];
    nd.history.unshift({ ts: now(), type: histType, delta: delta });
    if (nd.history.length > 20) nd.history.length = 20;
    data.nodes[nodeKey] = nd;
    addLog(data, nodeKey, histType + ' ' + (delta >= 0 ? '↑' : '↓') + Math.abs(delta), delta);
    saveData(data);
    // 世界服务器回合计数器（每次答题/实操完成 +1）
    try {
        var round = parseInt(localStorage.getItem('worldServerRound') || '0', 10);
        localStorage.setItem('worldServerRound', String(round + 1));
    } catch(e) {}
    // 检测世界服务器解锁状态
    checkWorldServerUnlock(data);
    return newP;
}

function checkWorldServerUnlock(data) {
    var allDone = NODES.every(function(n) {
        return (data.nodes[n.key] || {}).progress >= 100;
    });
    var entry = document.getElementById('worldServerEntry');
    if (!entry) return;
    
    if (allDone) {
        // 全部100%：解锁
        entry.style.display = 'block';
        entry.innerHTML = '<button onclick="enterWorldServer()" style="padding:5px 14px;background:rgba(0,180,255,0.15);border:1px solid rgba(0,180,255,0.6);color:#00d4ff;font-family:\'Courier New\',monospace;font-size:11px;cursor:pointer;border-radius:4px;font-weight:bold;text-shadow:0 0 6px rgba(0,180,255,0.5);">🌐 进入世界服务器</button>';
    } else {
        // 未全部100%：显示锁定状态和进度
        var done = NODES.filter(function(n) {
            return (data.nodes[n.key] || {}).progress >= 100;
        }).length;
        entry.style.display = 'block';
        entry.innerHTML = '<div style="padding:5px 14px;background:rgba(255,68,68,0.05);border:1px solid rgba(255,68,68,0.2);color:#cc4444;font-family:\'Courier New\',monospace;font-size:9px;border-radius:4px;cursor:not-allowed;">🔒 世界服务器 (' + done + '/4 节点完成)</div>';
    }
}

function enterWorldServer() {
    var w = window.open('world-server.html', '_blank');
    if (!w) {
        // 弹窗被拦截，改用 location 跳转
        alert('⚠ 弹窗被浏览器拦截，将在当前窗口打开世界服务器...');
        window.location.href = 'world-server.html';
    }
}

var quizState = {
    nodeKey: '',
    questions: [],
    currentIdx: 0,
    results: [],   // true/false per question
    answered: false
};

function openQuiz(nodeKey) {
    var pool = QUIZ_BANK[nodeKey] || [];
    var shuffled = shuffleArr(pool);
    var picked = shuffled.slice(0, 3);
    // 对每题的选项进行随机排序（记录正确答案的文本）
    quizState = {
        nodeKey: nodeKey,
        questions: picked.map(function(q) {
            var opts = q.opts.slice();
            var correctText = opts[q.ans];
            var shuffledOpts = shuffleArr(opts);
            return {
                q: q.q,
                opts: shuffledOpts,
                correctText: correctText
            };
        }),
        currentIdx: 0,
        results: [],
        answered: false
    };
    var node = NODES.find(function(n){return n.key===nodeKey;}) || {};
    document.getElementById('quizModalTitle').textContent = '📝 ' + node.name + ' - 答题挑战';
    document.getElementById('quizModalSub').textContent = '共3题 · 答对+5进度 · 答错-2进度';
    document.getElementById('quizOverlay').classList.add('active');
    renderQuizQuestion();
}

function renderQuizQuestion() {
    var qs = quizState.questions;
    var idx = quizState.currentIdx;
    var el = document.getElementById('quizContent');

    if (idx >= qs.length) {
        renderQuizSummary();
        return;
    }

    var q = qs[idx];
    var correct = quizState.results.filter(Boolean).length;
    var wrong = quizState.results.filter(function(r){return !r;}).length;

    var html = '';
    // 进度点
    html += '<div class="quiz-progress-bar">';
    for (var i = 0; i < 3; i++) {
        var cls = 'qpb-dot';
        if (i < idx) cls += (quizState.results[i] ? ' done-correct' : ' done-wrong');
        else if (i === idx) cls += ' current';
        html += '<div class="' + cls + '"></div>';
    }
    html += '</div>';

    html += '<div class="quiz-question">';
    html += '<div class="quiz-q-num">Q' + (idx+1) + '/3</div>';
    html += q.q;
    html += '</div>';
    html += '<div class="quiz-options">';
    q.opts.forEach(function(opt, i) {
        html += '<div class="quiz-option" onclick="answerQuiz(' + i + ')" data-idx="' + i + '">' + opt + '</div>';
    });
    html += '</div>';
    html += '<div class="btn-row"><button class="btn-close" onclick="closeQuiz()">✕ 关闭</button></div>';

    el.innerHTML = html;
    quizState.answered = false;
}

function answerQuiz(optIdx) {
    if (quizState.answered) return;
    quizState.answered = true;
    var q = quizState.questions[quizState.currentIdx];
    var selectedText = q.opts[optIdx];
    var isCorrect = selectedText === q.correctText;
    quizState.results.push(isCorrect);

    // 高亮选项
    var opts = document.querySelectorAll('.quiz-option');
    for (var i = 0; i < opts.length; i++) {
        opts[i].classList.add('disabled');
        if (q.opts[i] === q.correctText) opts[i].classList.add('correct');
    }
    if (!isCorrect) opts[optIdx].classList.add('wrong');

    // 反馈提示
    var feedback = document.createElement('div');
    feedback.className = 'quiz-feedback ' + (isCorrect ? 'ok' : 'fail');
    feedback.textContent = isCorrect ? '✓ 正确！+5 进度' : '✗ 答错了，-2 进度。正确答案: ' + q.correctText;
    var el = document.getElementById('quizContent');
    var optArea = el.querySelector('.quiz-options');
    optArea.parentNode.insertBefore(feedback, optArea.nextSibling);

    // 延迟下一题
    quizState.currentIdx++;
    setTimeout(function() {
        renderQuizQuestion();
    }, isCorrect ? 900 : 1400);
}

function renderQuizSummary() {
    var correct = quizState.results.filter(Boolean).length;
    var wrong = 3 - correct;
    var delta = correct * 5 - wrong * 2;

    // 应用进度变化
    var newP = updateProgress(quizState.nodeKey, delta, '答题');
    renderAll();

    var el = document.getElementById('quizContent');
    var dCls = delta >= 0 ? 'delta-pos' : 'delta-neg';
    var dStr = (delta >= 0 ? '+' : '') + delta;
    var node = NODES.find(function(n){return n.key===quizState.nodeKey;}) || {};

    var html = '<div class="quiz-summary">';
    html += '<div class="score-big">' + correct + '/3</div>';
    html += '<div class="score-label">答题完成</div>';
    html += '<div class="progress-delta ' + dCls + '">' + node.name + ' 进度 ' + dStr + '</div>';
    html += '<div style="font-size:10px;color:#008800;margin:6px 0">当前进度: ' + newP + '% &nbsp;|&nbsp; ' + getRank(newP).label + '</div>';
    if (correct === 3) {
        html += '<div style="font-size:11px;color:#00ff41;margin-top:8px;text-shadow:0 0 6px #00ff41">🎯 全部答对！</div>';
    } else if (correct === 0) {
        html += '<div style="font-size:10px;color:#ff6666;margin-top:8px">继续学习，下次会更好！</div>';
    }
    html += '</div>';
    html += '<div class="btn-row"><button class="btn-primary" onclick="openQuiz(\'' + quizState.nodeKey + '\')">🔄 再来一次</button><button class="btn-close" onclick="closeQuiz()">✕ 关闭</button></div>';
    el.innerHTML = html;
}

function closeQuiz() {
    document.getElementById('quizOverlay').classList.remove('active');
}

var simState = {
    nodeKey: '',
    steps: [],
    currentStep: 0,
    running: false,
    totalGain: 0
};

function openSim(nodeKey) {
    var cfg = SIM_CONFIGS[nodeKey];
    if (!cfg) return;
    simState = { nodeKey: nodeKey, steps: cfg.steps, currentStep: 0, running: false, totalGain: 0 };
    var node = NODES.find(function(n){return n.key===nodeKey;}) || {};
    document.getElementById('simModalTitle').textContent = cfg.title;
    document.getElementById('simModalSub').textContent = '按顺序执行4个步骤 · 每步获得进度奖励';
    document.getElementById('simOverlay').classList.add('active');
    renderSim();
}

function renderSim() {
    var el = document.getElementById('simContent');
    var cfg = SIM_CONFIGS[simState.nodeKey];

    var html = '<div class="terminal" id="simTerminal">';
    html += '<div class="term-line term-info">// 模拟渗透终端 v2.1 - EDUCATIONAL USE ONLY</div>';
    html += '<div class="term-line term-info">// 目标: ' + (NODES.find(function(n){return n.key===simState.nodeKey;})||{}).name + '</div>';
    html += '<div class="term-line" style="color:#003300">─────────────────────────────────</div>';
    html += '<div id="termOutput"></div>';
    html += '<div class="term-cursor" id="termCursor"></div>';
    html += '</div>';

    html += '<div class="sim-steps" id="simSteps">';
    simState.steps.forEach(function(step, i) {
        var isDone = i < simState.currentStep;
        var isAvail = i === simState.currentStep;
        var cls = 'sim-step-btn' + (isDone ? ' done' : '');
        var disabled = !isAvail && !isDone ? 'disabled' : '';
        var prefix = isDone ? '✅ ' : (isAvail ? '▶ ' : '⬜ ');
        html += '<button class="' + cls + '" onclick="executeStep(' + i + ')" ' + disabled + '>' + prefix + step.label + (isDone ? ' [+' + step.gain + ' 进度]' : '') + '</button>';
    });
    html += '</div>';

    if (simState.currentStep >= simState.steps.length) {
        html += '<div class="quiz-summary" style="padding-top:5px">';
        html += '<div style="font-size:11px;color:#00ff41;font-weight:bold">✓ 所有步骤完成！</div>';
        html += '<div class="progress-delta delta-pos" style="margin-top:4px">+' + simState.totalGain + ' 进度</div>';
        html += '</div>';
    }

    html += '<div class="btn-row"><button class="btn-close" onclick="closeSim()">✕ 关闭</button></div>';
    el.innerHTML = html;
}

function executeStep(stepIdx) {
    if (stepIdx !== simState.currentStep || simState.running) return;
    simState.running = true;
    var step = simState.steps[stepIdx];
    var termEl = document.getElementById('termOutput');
    var cursor = document.getElementById('termCursor');

    // 隐藏按钮
    var btns = document.querySelectorAll('.sim-step-btn');
    for (var i = 0; i < btns.length; i++) btns[i].disabled = true;
    if (cursor) cursor.style.display = 'inline-block';

    // 显示命令
    var cmdLine = document.createElement('div');
    cmdLine.className = 'term-line term-cmd';
    cmdLine.textContent = step.cmd;
    termEl.appendChild(cmdLine);

    // 打字机效果输出各行
    var outputLines = step.output;
    var lineIdx = 0;

    function showNextLine() {
        if (lineIdx >= outputLines.length) {
            // 完成
            if (cursor) cursor.style.display = 'none';
            simState.currentStep++;
            simState.totalGain += step.gain;
            simState.running = false;
            updateProgress(simState.nodeKey, step.gain, '实操步骤' + (stepIdx + 1));
            renderAll();
            renderSim();
            // 滚动到底部
            var terminal = document.getElementById('simTerminal');
            if (terminal) terminal.scrollTop = terminal.scrollHeight;
            return;
        }
        var line = outputLines[lineIdx];
        var el = document.createElement('div');
        el.className = 'term-line ' + getTermClass(line, step.type);
        termEl.appendChild(el);

        // 逐字显示
        var charIdx = 0;
        var interval = setInterval(function() {
            if (charIdx < line.length) {
                el.textContent = line.substring(0, charIdx + 1);
                charIdx++;
            } else {
                clearInterval(interval);
                lineIdx++;
                var terminal = document.getElementById('simTerminal');
                if (terminal) terminal.scrollTop = terminal.scrollHeight;
                setTimeout(showNextLine, 80);
            }
        }, 18);
    }

    setTimeout(showNextLine, 300);
}

function getTermClass(line, type) {
    if (line.startsWith('[+]') || line.includes('✓') || line.includes('accepted') || line.includes('established')) return 'term-ok';
    if (line.startsWith('[!]') || line.includes('WARNING') || line.includes('detected')) return 'term-warn';
    if (line.startsWith('[*]') || line.startsWith('//')) return 'term-info';
    if (line.startsWith('uid=') || line.includes('PWNED') || line.includes('COMPROMISED') || line.includes('BYPASSED') || line.includes('EXPLOITED')) return 'term-ok';
    return 'term-out';
}

function closeSim() {
    document.getElementById('simOverlay').classList.remove('active');
}

// ===== 重置 =====
function confirmReset() {
    if (confirm('⚠ 确认重置所有学习进度？此操作不可恢复！')) {
        localStorage.removeItem(STORAGE_KEY);
        renderAll();
    }
}

// ===== 初始化 =====
renderAll();
