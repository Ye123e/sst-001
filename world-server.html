<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌐 世界服务器 - 万维网攻防模拟</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    background: #000;
    color: #00ff41;
    font-family: 'Courier New', Courier, monospace;
    min-height: 100vh;
    overflow-x: hidden;
}
body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
    pointer-events: none;
    z-index: 9999;
}
body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.5) 100%);
    pointer-events: none;
    z-index: 9998;
}

.header {
    background: linear-gradient(90deg, #001a00, #002800, #001a00);
    border-bottom: 2px solid #00ff41;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 0 20px rgba(0,255,65,0.2);
    flex-wrap: wrap;
    gap: 10px;
}
.header-title { font-size: 18px; font-weight: bold; color: #00ff41; text-shadow: 0 0 10px #00ff41; letter-spacing: 2px; }
.header-sub { font-size: 9px; color: #005500; margin-top: 2px; letter-spacing: 1px; }

.stats-bar {
    display: flex;
    gap: 14px;
    align-items: center;
    flex-wrap: wrap;
}
.stat-item {
    font-size: 11px;
    color: #00aa00;
    background: rgba(0,255,65,0.05);
    border: 1px solid rgba(0,255,65,0.2);
    padding: 4px 10px;
    border-radius: 3px;
}
.stat-item b { color: #00ff41; font-size: 13px; }

.tab-bar {
    display: flex;
    gap: 2px;
    padding: 8px 20px 0;
    background: rgba(0,15,0,0.8);
    border-bottom: 1px solid #003300;
    flex-wrap: wrap;
}
.tab-btn {
    flex: 0 0 auto;
    padding: 6px 14px;
    background: rgba(0,255,65,0.03);
    border: 1px solid #003300;
    border-bottom: none;
    border-radius: 4px 4px 0 0;
    color: #006600;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
}
.tab-btn:hover { color: #00aa00; background: rgba(0,255,65,0.06); }
.tab-btn.active { color: #00ff41; background: rgba(0,255,65,0.1); border-color: #00ff41; text-shadow: 0 0 6px rgba(0,255,65,0.4); }

.tab-content { display: none; padding: 14px 20px; }
.tab-content.active { display: block; }

/* 世界地图 */
.map-container { background: rgba(0,10,0,0.6); border: 1px solid #003300; border-radius: 8px; padding: 16px; }
.map-svg { width: 100%; height: auto; }
.cluster-node { cursor: pointer; transition: all 0.3s; }
.cluster-node:hover { filter: brightness(1.5); }
.cluster-node circle { transition: r 0.3s; }
.cluster-node:hover circle { r: 26; }
.cluster-label { font-size: 10px; fill: #00aa00; text-anchor: middle; pointer-events: none; }
.cluster-level { font-size: 8px; fill: #005500; text-anchor: middle; pointer-events: none; }
.link-line { stroke: #003300; stroke-width: 1; fill: none; }
.link-line.owned { stroke: #00cc44; stroke-width: 1.5; }
.link-line.tunnel { stroke: #ff6600; stroke-width: 1.5; stroke-dasharray: 5,3; }
.link-line.tunnel-owned { stroke: #00ff41; stroke-width: 2; stroke-dasharray: 5,3; }
.cluster-owned circle { fill: #004400; stroke: #00ff41; }
.cluster-broken circle { fill: #330000; stroke: #ff4444; }
.cluster-normal circle { fill: #001a00; stroke: #006600; }
.cluster-protected circle { stroke: #ffaa00; stroke-width: 2.5; }

/* 服务器群详情 */
.cluster-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: rgba(0,255,65,0.04);
    border: 1px solid #003300;
    border-radius: 6px;
    margin-bottom: 12px;
    flex-wrap: wrap;
}
.cluster-header h2 { font-size: 16px; color: #00ff41; text-shadow: 0 0 6px rgba(0,255,65,0.3); }
.cluster-badge { font-size: 10px; padding: 3px 10px; border-radius: 3px; border: 1px solid; }
.badge-protected { color: #ffaa00; border-color: #ffaa00; background: rgba(255,170,0,0.08); }
.badge-honeypot { color: #ff1744; border-color: #ff1744; background: rgba(255,23,68,0.08); }
.badge-owned { color: #00ff41; border-color: #00ff41; background: rgba(0,255,65,0.08); }

/* 终端 */
.terminal {
    background: #000;
    border: 1px solid #003300;
    border-radius: 4px;
    padding: 10px;
    font-size: 10px;
    line-height: 1.6;
    height: 240px;
    overflow-y: auto;
    margin-bottom: 8px;
    font-family: 'Courier New', monospace;
}
.term-line { margin: 1px 0; word-break: break-all; }
.term-cmd { color: #00ff41; }
.term-cmd::before { content: '$ '; color: #005500; }
.term-out { color: #008800; }
.term-ok { color: #00cc44; }
.term-err { color: #ff6666; }
.term-warn { color: #ffaa00; }
.term-info { color: #00aaff; }
.term-dim { color: #003300; }
.term-cursor { display: inline-block; width: 7px; height: 12px; background: #00ff41; animation: blink 0.8s infinite; vertical-align: middle; }
@keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }

.cmd-input-row { display: flex; gap: 6px; margin-bottom: 8px; }
.cmd-input {
    flex: 1;
    background: #001a00;
    border: 1px solid #003300;
    color: #00ff41;
    padding: 7px 10px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    border-radius: 4px;
    outline: none;
}
.cmd-input:focus { border-color: #00ff41; box-shadow: 0 0 6px rgba(0,255,65,0.2); }
.cmd-input::placeholder { color: #003300; }

.quick-btns { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }
.quick-btn {
    flex: 0 0 auto;
    padding: 5px 10px;
    background: rgba(0,180,255,0.06);
    border: 1px solid rgba(0,180,255,0.25);
    color: #00aacc;
    font-family: 'Courier New', monospace;
    font-size: 10px;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.2s;
}
.quick-btn:hover { background: rgba(0,180,255,0.12); color: #00d4ff; }
.quick-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* 服务器列表 */
.server-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 6px; margin-top: 10px; }
.server-card {
    background: rgba(0,15,0,0.8);
    border: 1px solid #003300;
    border-radius: 4px;
    padding: 8px 10px;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 10px;
}
.server-card:hover { border-color: #00aa00; }
.server-card.broken { border-color: #00ff41; background: rgba(0,255,65,0.04); }
.server-card.targeting { border-color: #ff6600; box-shadow: 0 0 8px rgba(255,102,0,0.3); }
.server-card .srv-name { color: #00ff41; font-weight: bold; }
.server-card .srv-info { color: #006600; margin-top: 2px; }
.server-hp-bar { height: 4px; background: #001a00; border-radius: 2px; overflow: hidden; margin-top: 4px; border: 1px solid #002200; }
.server-hp-fill { height: 100%; transition: width 0.4s; }
.hp-high { background: #00cc44; }
.hp-mid { background: #ffaa00; }
.hp-low { background: #ff4444; }
.hp-zero { background: #003300; }

/* 僵尸网络 */
.botnet-panel { background: rgba(0,10,0,0.6); border: 1px solid #003300; border-radius: 8px; padding: 14px; margin-bottom: 14px; }
.botnet-panel h3 { font-size: 13px; color: #00ff41; margin-bottom: 8px; }
.botnet-list { display: flex; flex-direction: column; gap: 6px; }
.botnet-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: rgba(0,255,65,0.04);
    border: 1px solid #003300;
    border-radius: 4px;
    font-size: 11px;
}
.botnet-item .bn-name { color: #00ff41; }
.botnet-item .bn-stats { color: #008800; font-size: 10px; }

.attack-control {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
    margin-top: 10px;
    padding: 10px;
    background: rgba(0,180,255,0.03);
    border: 1px solid rgba(0,180,255,0.15);
    border-radius: 4px;
}
.attack-control select, .attack-control button {
    background: #001a00;
    border: 1px solid #003300;
    color: #00aa00;
    padding: 6px 10px;
    font-family: 'Courier New', monospace;
    font-size: 10px;
    border-radius: 3px;
    outline: none;
}
.attack-control button {
    cursor: pointer;
    background: rgba(255,102,0,0.1);
    border-color: rgba(255,102,0,0.3);
    color: #ff8844;
}
.attack-control button:hover { background: rgba(255,102,0,0.2); }
.attack-control button:disabled { opacity: 0.4; cursor: not-allowed; }

/* FBI面板 */
.fbi-panel { background: rgba(0,10,0,0.6); border: 1px solid #003300; border-radius: 8px; padding: 14px; margin-bottom: 14px; }
.fbi-status { font-size: 12px; padding: 10px; border-radius: 4px; margin-bottom: 10px; }
.fbi-active { background: rgba(255,170,0,0.08); border: 1px solid rgba(255,170,0,0.3); color: #ffaa00; }
.fbi-inactive { background: rgba(0,255,65,0.04); border: 1px solid #003300; color: #006600; }
.fbi-honeypot { background: rgba(255,23,68,0.08); border: 1px solid rgba(255,23,68,0.3); color: #ff4466; }
.fbi-section { margin-bottom: 10px; }
.fbi-section-title { font-size: 11px; color: #005500; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }
.fbi-protected-list { display: flex; gap: 6px; flex-wrap: wrap; }
.fbi-protected-item { font-size: 10px; padding: 3px 8px; border: 1px solid #ffaa00; border-radius: 3px; color: #ffaa00; background: rgba(255,170,0,0.05); }

/* 日志 */
.log-container { background: rgba(0,10,0,0.6); border: 1px solid #002200; border-radius: 6px; padding: 10px 14px; max-height: 500px; overflow-y: auto; }
.log-entry { font-size: 9px; padding: 3px 0; border-bottom: 1px solid #001500; display: flex; gap: 6px; }
.log-entry:last-child { border-bottom: none; }
.log-ts { color: #003300; min-width: 50px; }
.log-type { min-width: 60px; font-weight: bold; }
.log-type.attack { color: #ff8844; }
.log-type.broken { color: #00ff41; }
.log-type.fbi { color: #ffaa00; }
.log-type.botnet { color: #ff44ff; }
.log-type.system { color: #00aaff; }
.log-msg { flex: 1; color: #006600; }

/* 病毒武器库 */
.virus-panel { background: rgba(0,10,0,0.6); border: 1px solid #003300; border-radius: 8px; padding: 14px; margin-bottom: 14px; }
.virus-panel h3 { font-size: 13px; color: #00ff41; margin-bottom: 8px; }
.zd-card { background: rgba(0,15,0,0.6); border: 1px solid; border-radius: 6px; padding: 10px; margin: 4px 0; box-shadow: 0 0 8px rgba(0,255,65,0.05); }
.zd-card:hover { box-shadow: 0 0 14px rgba(0,255,65,0.12); }
.zd-card .btn-virus { padding: 5px 14px; background: rgba(0,255,65,0.1); border: 1px solid #00ff41; color: #00ff41; font-family: 'Courier New', monospace; font-size: 10px; cursor: pointer; border-radius: 3px; }
.zd-card .btn-virus:hover { background: rgba(0,255,65,0.2); }
.virus-list { display: flex; flex-direction: column; gap: 6px; }
.virus-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: rgba(0,255,65,0.04);
    border: 1px solid #003300;
    border-radius: 4px;
    font-size: 11px;
}
.virus-item .vn-name { color: #00ff41; font-weight: bold; }
.virus-item .vn-stats { color: #008800; font-size: 10px; }
.virus-infected { animation: virusPulse 1s infinite; }
@keyframes virusPulse {
    0% { border-color: #ff4444; box-shadow: 0 0 5px rgba(255,68,68,0.3); }
    50% { border-color: #ff0000; box-shadow: 0 0 15px rgba(255,0,0,0.6); }
    100% { border-color: #ff4444; box-shadow: 0 0 5px rgba(255,68,68,0.3); }
}

/* 0day漏洞 */
.zeroday-panel { background: rgba(0,10,0,0.6); border: 1px solid #003300; border-radius: 8px; padding: 14px; margin-bottom: 14px; }
.zeroday-panel h3 { font-size: 13px; color: #00ff41; margin-bottom: 8px; }
.zeroday-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: rgba(0,255,65,0.04);
    border: 1px solid #003300;
    border-radius: 4px;
    font-size: 11px;
    margin-bottom: 6px;
}
.zeroday-item .zd-name { color: #ffaa00; font-weight: bold; }
.zeroday-item .zd-level { font-size: 10px; padding: 2px 6px; border-radius: 3px; }
.zd-critical { background: rgba(255,23,68,0.2); color: #ff1744; border: 1px solid #ff1744; }
.zd-high { background: rgba(255,170,0,0.2); color: #ffaa00; border: 1px solid #ffaa00; }
.zd-medium { background: rgba(0,170,255,0.2); color: #00aaff; border: 1px solid #00aaff; }
.zd-low { background: rgba(0,255,65,0.2); color: #00ff41; border: 1px solid #00ff41; }

/* 黑市工具商店 */
.shop-panel { background: rgba(0,10,0,0.6); border: 1px solid #003300; border-radius: 8px; padding: 14px; margin-bottom: 14px; }
.shop-panel h3 { font-size: 13px; color: #00ff41; margin-bottom: 8px; }
.shop-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: rgba(0,255,65,0.04);
    border: 1px solid #003300;
    border-radius: 4px;
    font-size: 11px;
    margin-bottom: 6px;
}
.shop-item .shop-name { color: #00ff41; font-weight: bold; }
.shop-item .shop-price { color: #ffaa00; font-size: 10px; }
.shop-item .shop-effect { color: #008800; font-size: 9px; }
.shop-btn {
    padding: 4px 10px;
    background: rgba(0,255,65,0.1);
    border: 1px solid rgba(0,255,65,0.3);
    color: #00ff41;
    font-family: 'Courier New', monospace;
    font-size: 9px;
    cursor: pointer;
    border-radius: 3px;
}
.shop-btn:hover { background: rgba(0,255,65,0.2); }
.shop-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* 通用 */
.btn-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 10px; }
.btn-close { padding: 6px 16px; background: rgba(255,68,68,0.08); border: 1px solid rgba(255,68,68,0.3); color: #ff6666; font-family: 'Courier New', monospace; font-size: 11px; cursor: pointer; border-radius: 4px; }
.btn-close:hover { background: rgba(255,68,68,0.15); }
.btn-primary { padding: 6px 16px; background: rgba(0,255,65,0.08); border: 1px solid rgba(0,255,65,0.3); color: #00ff41; font-family: 'Courier New', monospace; font-size: 11px; cursor: pointer; border-radius: 4px; }
.btn-primary:hover { background: rgba(0,255,65,0.15); }
.reset-btn { padding: 4px 10px; background: rgba(255,68,68,0.05); border: 1px solid rgba(255,68,68,0.2); color: #cc3333; font-family: 'Courier New', monospace; font-size: 8px; cursor: pointer; border-radius: 3px; }
.reset-btn:hover { background: rgba(255,68,68,0.1); }

.locked-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.95);
    z-index: 10000;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
}
.locked-overlay h1 { font-size: 20px; color: #ff4444; text-shadow: 0 0 10px rgba(255,68,68,0.5); }
.locked-overlay p { font-size: 12px; color: #006600; }
.locked-overlay .lock-icon { font-size: 48px; }

/* 自动挖掘面板 */
.automine-panel { background: rgba(0,10,0,0.6); border: 1px solid #003300; border-radius: 8px; padding: 14px; margin-bottom: 14px; }
.automine-panel h3 { font-size: 13px; color: #00ff41; margin-bottom: 8px; }
.progress-bar-wrap { background: #001a00; border: 1px solid #003300; border-radius: 4px; height: 20px; margin: 8px 0; overflow: hidden; }
.progress-bar-fill { background: linear-gradient(90deg, #003300, #00ff41, #00ff41); height: 100%; transition: width 0.3s; border-radius: 3px; }
.progress-text { font-size: 9px; color: #008800; text-align: center; margin: 4px 0; }
.mine-result-table { width: 100%; border-collapse: collapse; font-size: 10px; margin-top: 8px; }
.mine-result-table th { text-align: left; padding: 6px 8px; color: #00ff41; border-bottom: 1px solid #003300; }
.mine-result-table td { padding: 6px 8px; border-bottom: 1px solid #001500; }
.mine-result-table .grade-S { color: #ff1744; }
.mine-result-table .grade-A { color: #ff9100; }
.mine-result-table .grade-B { color: #ffea00; }
.mine-result-table .grade-C { color: #76ff03; }
.mine-result-table .grade-D { color: #00aaff; }
.btn-mine { padding: 8px 20px; background: rgba(0,255,65,0.1); border: 1px solid #00ff41; color: #00ff41; font-family: 'Courier New', monospace; font-size: 12px; cursor: pointer; border-radius: 4px; letter-spacing: 1px; transition: all 0.2s; }
.btn-mine:hover { background: rgba(0,255,65,0.2); box-shadow: 0 0 10px rgba(0,255,65,0.3); }
.btn-mine:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-mine.stop { border-color: #ff4444; color: #ff4444; background: rgba(255,68,68,0.1); }
.btn-mine.stop:hover { background: rgba(255,68,68,0.2); }
</style>
</head>
<body>

<div class="header">
    <div>
        <div class="header-title">🌐 世界服务器</div>
        <div class="header-sub">WORLD WIDE WEB ATTACK SIMULATION / 万维网攻防模拟</div>
    </div>
    <div class="stats-bar" id="statsBar">
        <div class="stat-item">⚔️ 攻击力 <b id="statAttack">0</b></div>
        <div class="stat-item">🛡️ 防御力 <b id="statDefense">0</b></div>
        <div class="stat-item">🧟 僵尸网络 <b id="statBotnet">0</b>群</div>
        <div class="stat-item">📊 已攻破 <b id="statBroken">0</b>/200</div>
        <div class="stat-item">📅 回合 <b id="statRound">0</b></div>
        <button class="reset-btn" onclick="confirmReset()">⚠ 重置</button>
    </div>
</div>

<div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('map')">🗺️ 世界地图</button>
    <button class="tab-btn" onclick="switchTab('cluster')">💻 服务器群</button>
    <button class="tab-btn" onclick="switchTab('botnet')">🧟 僵尸网络</button>
    <button class="tab-btn" onclick="switchTab('fbi')">🛡️ FBI状态</button>
    <button class="tab-btn" onclick="switchTab('tunnel')">🔗 代理隧道</button>
    <button class="tab-btn" onclick="switchTab('virus')">🦠 病毒武器</button>
    <button class="tab-btn" onclick="switchTab('zeroday')">💎 0day漏洞</button>
    <button class="tab-btn" onclick="switchTab('automine')">⛏️ 自动挖掘</button>
    <button class="tab-btn" onclick="switchTab('logs')">📊 攻击日志</button>
</div>

<div class="tab-content active" id="tab-map">
    <div class="map-container" id="mapContainer">
    </div>
</div>

<div class="tab-content" id="tab-cluster">
    <div id="clusterView">
        <p style="color:#006600;font-size:12px;">请在世界地图中选择一个服务器群。</p>
    </div>
</div>

<div class="tab-content" id="tab-botnet">
    <div id="botnetView"></div>
</div>

<div class="tab-content" id="tab-fbi">
    <div id="fbiView"></div>
</div>

<div class="tab-content" id="tab-tunnel">
    <div id="tunnelView"></div>
</div>

<div class="tab-content" id="tab-virus">
    <div id="virusView"></div>
</div>

<div class="tab-content" id="tab-zeroday">
    <div id="zerodayView"></div>
</div>

<div class="tab-content" id="tab-automine">
    <div id="automineView"></div>
</div>

<div class="tab-content" id="tab-logs">
    <div class="log-container" id="logContainer"></div>
</div>

<div class="locked-overlay" id="lockedOverlay" style="display:none;">
    <div class="lock-icon">🔒</div>
    <h1>世界服务器未解锁</h1>
    <p>请在渗透学习平台中将全部4个节点学习进度提升至100%</p>
    <p style="font-size:10px;color:#003300;">hack-training.html → 4节点全100% → 解锁</p>
</div>

<script>
// ===== 常量 =====
var WORLD_STATE_KEY = 'worldServerState';
var ROUND_KEY = 'worldServerRound';

var CLUSTERS_CONFIG = [

function getConnections(clusterId) {
    var cfg = CLUSTERS_CONFIG[clusterId];
    var conns = [];
    CLUSTERS_CONFIG.forEach(function(c) {
        if (c.id !== clusterId && c.network === cfg.network) {
            conns.push(c.id);
        }
    });
    // 代理隧道：政府内网(1) <-> 国际根服务器(9)
    if (clusterId === 1) conns.push(9);
    if (clusterId === 9) conns.push(1);
    return conns;
}

// ===== 工具函数 =====
function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

function shuffleArr(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
}

function now() {
    var d = new Date();
    return ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2)+':'+('0'+d.getSeconds()).slice(-2);
}

function addLog(data, type, msg) {
    data.logs.unshift({ ts: now(), round: data.currentRound, type: type, msg: msg });
    if (data.logs.length > 100) data.logs.length = 100;
}

function getCluster(data, id) { return data.clusters.find(function(c){return c.id===id;}); }
function getServer(cluster, sid) { return cluster.servers.find(function(s){return s.id===sid;}); }

function generateDataFragment(data, server, cluster) {
    var fragName = cluster ? (FRAGMENT_TYPE_MAP[cluster.name] || '未知数据') : '跨网代理隧道数据';
    var value = server.level * 500;
    var btcReward = (value / 50000).toFixed(4);
    var repReward = server.level;
    var frag = {
        id: 'frag_' + Date.now() + '_' + Math.floor(Math.random()*1000),
        name: fragName,
        type: cluster ? cluster.network : 'tunnel',
        value: value,
        btcReward: btcReward,
        repReward: repReward,
        fromCluster: cluster ? cluster.name : '代理隧道',
        fromServer: server.name,
        round: data.currentRound
    };
    data.player.dataFragments.push(frag);
    syncFragmentsToInvestSim(data);
    addLog(data, 'system', '💎 获得数据碎片：' + fragName + '（价值 ' + btcReward + ' BTC）');
    termPrint('[💎] 获得数据碎片：' + fragName + '（可到暗网市场出售）', 'term-ok');
}

function syncFragmentsToInvestSim(data) {
    try {
        var investKey = 'investSimState_v13';
        var raw = localStorage.getItem(investKey);
        var investState = raw ? JSON.parse(raw) : {};
        investState.worldFragments = (data.player.dataFragments || []).map(function(f) {
            return {
                id: f.id,
                name: f.name,
                type: f.type,
                value: f.value,
                btcReward: f.btcReward,
                repReward: f.repReward,
                fromCluster: f.fromCluster,
                fromServer: f.fromServer,
                round: f.round
            };
        });
        // 确保 wsTools 字段存在
        if (!investState.wsTools) investState.wsTools = { virusResearchSpeed:0, attackPowerBonus:0, zeroDayChance:0, botnetEfficiency:0 };
        localStorage.setItem(investKey, JSON.stringify(investState));
    } catch(e) {}
}

function loadMarketFromInvestSim(data) {
    try {
        var investKey = 'investSimState_v13';
        var raw = localStorage.getItem(investKey);
        if (!raw) return;
        var investState = JSON.parse(raw);
        var assets = investState.assets || [];
        var crypto = assets.find(function(a) { return a.id === 'crypto'; });
        data.market.btc = crypto ? (crypto.holding || 0) : 0;
        data.market.reputation = investState.darknetReputation || 0;
        var wsTools = investState.wsTools || {};
        data.player.toolLevel = (wsTools.attackPowerBonus || 0);
    } catch(e) {}
}

function removeFragmentFromWorldServer(fragId) {
    try {
        var raw = localStorage.getItem('worldServerState');
        if (!raw) return;
        var data = JSON.parse(raw);
        data.player.dataFragments = (data.player.dataFragments || []).filter(function(f) { return f.id !== fragId; });
        localStorage.setItem('worldServerState', JSON.stringify(data));
    } catch(e) {}
}

function markServerBroken(data, server, cluster) {
    if (server.isBroken) return;
    server.isBroken = true;
    server.hp = 0;
    generateDataFragment(data, server, cluster);
}


function calcPlayerAttack(data) {
    var atk = 10;
    data.clusters.forEach(function(c) {
        c.servers.forEach(function(s) {
            if (s.isBroken) atk += s.level * 2;
        });
    });
    // 工具等级加成
    var tl = data.player ? (data.player.toolLevel || 0) : 0;
    atk += tl * 5;
    // 蜜罐减半（隧道攻破后蜜罐永久失效，不减半）
    var tunnelBroken = data.tunnel && data.tunnel.isBroken;
    if (!tunnelBroken && data.fbi.honeypotDebuffEnds > data.currentRound) atk = Math.floor(atk / 2);
    return atk;
}

function calcPlayerDefense(data) {
    var def = 5;
    data.clusters.forEach(function(c) {
        c.servers.forEach(function(s) {
            if (s.isBroken) def += Math.ceil(s.level * 1.5);
        });
    });
    return def;
}

function countBrokenServers(data) {
    var count = 0;
    data.clusters.forEach(function(c) {
        c.servers.forEach(function(s) { if (s.isBroken) count++; });
    });
    return count;
}

function countOwnedClusters(data) {
    return data.clusters.filter(function(c){return c.isOwned;}).length;
}

function countForceRepairedServers(data) {
    var count = 0;
    data.clusters.forEach(function(c) {
        c.servers.forEach(function(s) { if (s.forceRepairBuff > 0) count++; });
    });
    return count;
}

function checkForceRepair(server, data) {
    if (server.forceRepairBuff <= 0) return { blocked: false, reduced: false, damageMul: 1 };
    if (Math.random() < 0.7) {
        return { blocked: true, reduced: false, damageMul: 0 };
    }
    return { blocked: false, reduced: true, damageMul: 0.1 };
}

// ===== 解锁检测 =====
function checkUnlock() {
    var data = loadData();
    var hackData = null;
    try { hackData = JSON.parse(localStorage.getItem('hackTrainingProgress') || 'null'); } catch(e) {}
    var allDone = false;
    if (hackData && hackData.nodes) {
        allDone = ['firewall','gateway','database','appcore'].every(function(k) {
            return (hackData.nodes[k] || {}).progress >= 100;
        });
    }
    if (allDone && !data.unlocked) {
        data.unlocked = true;
        addLog(data, 'system', '世界服务器已解锁！万维网攻防模拟启动。');
        saveData(data);
    }
    if (!data.unlocked) {
        document.getElementById('lockedOverlay').style.display = 'flex';
        return false;
    }
    document.getElementById('lockedOverlay').style.display = 'none';
    return true;
}

}

    };

    // Network A (left side): 1政府,2金融,4学术,5工业,6医疗
    // Network B (right side): 0电商,3社交,7游戏,8暗网,9根服务器
    positions = {
        1: {x: 90,  y: 70},   // 政府内网
        2: {x: 220, y: 70},   // 金融科技
        4: {x: 90,  y: 160},  // 学术科研
        5: {x: 220, y: 160},  // 工业控制
        6: {x: 155, y: 250},  // 医疗健康
        0: {x: 430, y: 70},   // 电商云
        3: {x: 560, y: 70},   // 社交媒体
        7: {x: 430, y: 160},  // 游戏服务
        8: {x: 560, y: 160},  // 暗网市场
        9: {x: 560, y: 250}   // 国际根服务器
    };

    var svg = '<svg class="map-svg" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg">';
    svg += '<text x="170" y="25" text-anchor="middle" font-size="11" fill="#534AB7" font-weight="500">网络A：政务科研网</text>';
    svg += '<text x="495" y="25" text-anchor="middle" font-size="11" fill="#0F6E56" font-weight="500">网络B：商业互联网</text>';
    // 网络分隔线
    svg += '<line x1="325" y1="30" x2="325" y2="310" stroke="#003300" stroke-width="0.5" stroke-dasharray="4,4"/>';

    // 连接线
    var drawn = {};
    data.clusters.forEach(function(c) {
        c.connections.forEach(function(connId) {
            var key = Math.min(c.id, connId) + '-' + Math.max(c.id, connId);
            if (drawn[key]) return;
            drawn[key] = true;
            var p1 = positions[c.id], p2 = positions[connId];
            var isTunnel = (c.id === 1 && connId === 9) || (c.id === 9 && connId === 1);
            var bothOwned = c.isOwned && getCluster(data, connId).isOwned;
            if (isTunnel) {
                var tBroken = data.tunnel && data.tunnel.isBroken;
                var tColor = tBroken ? '#00ff41' : '#ff6600';
                var tCls = tBroken ? 'link-line tunnel-owned' : 'link-line tunnel';
                // 可点击的粗线（透明，用于点击命中）
                svg += '<line x1="' + p1.x + '" y1="' + p1.y + '" x2="' + p2.x + '" y2="' + p2.y + '" stroke="transparent" stroke-width="15" style="cursor:pointer;" onclick="selectTunnel()"/>';
                svg += '<line class="' + tCls + '" x1="' + p1.x + '" y1="' + p1.y + '" x2="' + p2.x + '" y2="' + p2.y + '" style="pointer-events:none;"/>';
            } else {
                var cls = bothOwned ? 'link-line owned' : 'link-line';
                svg += '<line class="' + cls + '" x1="' + p1.x + '" y1="' + p1.y + '" x2="' + p2.x + '" y2="' + p2.y + '"/>';
            }
        });
    });

    // 节点
    data.clusters.forEach(function(c) {
        var p = positions[c.id];
        var isProtected = data.fbi.protectedClusters.indexOf(c.id) >= 0;
        var nodeCls = 'cluster-node ';
        if (c.isOwned) nodeCls += 'cluster-owned';
        else if (c.isBroken) nodeCls += 'cluster-broken';
        else nodeCls += 'cluster-normal';
        if (isProtected) nodeCls += ' cluster-protected';

        var brokenCount = c.servers.filter(function(s){return s.isBroken;}).length;
        var fillColor = c.isOwned ? '#004400' : (brokenCount > 0 ? '#330000' : '#001a00');
        var strokeColor = c.isOwned ? '#00ff41' : (brokenCount > 0 ? '#ff4444' : '#006600');
        if (isProtected) strokeColor = '#ffaa00';

        svg += '<g class="' + nodeCls + '" onclick="selectCluster(' + c.id + ')">';
        svg += '<circle cx="' + p.x + '" cy="' + p.y + '" r="22" fill="' + fillColor + '" stroke="' + strokeColor + '" stroke-width="' + (isProtected ? '2.5' : '1.5') + '"/>';
        // 破损进度
        if (brokenCount > 0 && !c.isOwned) {
            var pct = brokenCount / c.servers.length;
            svg += '<circle cx="' + p.x + '" cy="' + p.y + '" r="22" fill="none" stroke="#ff4444" stroke-width="2" stroke-dasharray="' + (2*Math.PI*22*pct) + ' ' + (2*Math.PI*22*(1-pct)) + '" transform="rotate(-90 ' + p.x + ' ' + p.y + ')" opacity="0.6"/>';
        }
        svg += '<text class="cluster-label" x="' + p.x + '" y="' + (p.y + 3) + '" fill="' + (c.isOwned ? '#00ff41' : '#00aa00') + '">' + c.name + '</text>';

function renderClusterView(data) {

    var html = '<div class="cluster-header">';
    html += '<h2>🌐 ' + c.name + '</h2>';

    if (brokenCount > 0) html += '<span class="cluster-badge" style="color:#ff4444;border-color:#ff4444;">已攻破 ' + brokenCount + '/' + c.servers.length + '</span>';
    if (c.isOwned) html += '<span class="cluster-badge badge-owned">🧟 已占领</span>';
    if (isProtected) html += '<span class="cluster-badge badge-protected">🛡️ FBI保护中</span>';
    if (hasHoneypot) html += '<span class="cluster-badge badge-honeypot">🍯 蜜罐已开启</span>';
    html += '</div>';

    // 连接的群
    html += '<div style="font-size:10px;color:#005500;margin-bottom:10px;">连接: ';
    c.connections.forEach(function(connId) {
        var conn = getCluster(data, connId);
        if (conn) html += '<span style="color:' + (conn.isOwned ? '#00ff41' : '#008800') + ';" onclick="selectCluster(' + connId + ')" style="cursor:pointer;">' + conn.name + '</span> ';
    });
    html += '</div>';

    // 终端
    html += '<div class="terminal" id="termOutput"></div>';
    html += '<div class="cmd-input-row">';
    html += '<input type="text" class="cmd-input" id="cmdInput" placeholder="输入命令 (help查看帮助)..." onkeydown="if(event.key===\'Enter\')executeCommand()"/>';
    html += '<button class="quick-btn" onclick="executeCommand()">▶ 执行</button>';
    html += '</div>';
    html += '<div class="quick-btns">';
    html += '<button class="quick-btn" onclick="quickCmd(\'scan_all\')">📡 nmap -sV -A</button>';
    html += '<button class="quick-btn" onclick="quickCmd(\'exploit_auto\')">⚔️ exploit</button>';
    html += '<button class="quick-btn" onclick="quickCmd(\'brute_force\')">🔐 hydra</button>';
    html += '<button class="quick-btn" onclick="quickCmd(\'sql_inject\')">💉 sqlmap</button>';
    html += '<button class="quick-btn" onclick="quickCmd(\'ddos\')">💥 hping3</button>';
    html += '<button class="quick-btn" onclick="quickCmd(\'full_auto\')">🚀 全自动</button>';
    html += '</div>';

    // 服务器列表
    html += '<div class="server-grid">';
    c.servers.forEach(function(s) {
        var hpPct = s.maxHp > 0 ? (s.hp / s.maxHp * 100) : 0;
        var hpCls = s.isBroken ? 'hp-zero' : (hpPct > 60 ? 'hp-high' : (hpPct > 30 ? 'hp-mid' : 'hp-low'));
        var cardCls = 'server-card' + (s.isBroken ? ' broken' : '') + (data.selectedServerId === s.id ? ' targeting' : '');
        var icon = s.isBroken ? '✅' : (s.reconDone ? '🔍' : '⬜');
        html += '<div class="' + cardCls + '" onclick="selectServer(\'' + s.id + '\')">';
        html += '<div><span class="srv-name">' + icon + ' ' + s.name + '</span> <span style="font-size:9px;color:#004400;">Lv.' + s.level + '</span></div>';

        } else {

            html += '<div class="server-hp-bar"><div class="server-hp-fill ' + hpCls + '" style="width:' + hpPct + '%"></div></div>';

function getSelectedServer() {
    var data = loadData();
    if (data.selectedClusterId < 0 || !data.selectedServerId) return null;
    var c = getCluster(data, data.selectedClusterId);
    if (!c) return null;
    return getServer(c, data.selectedServerId);
}

function executeCommand() {
    var input = document.getElementById('cmdInput');
    if (!input) return;
    var cmd = input.value.trim();
    if (!cmd) return;
    input.value = '';
    termPrintCmd(cmd);
    parseCommand(cmd);
}

function quickCmd(type) {
    CMD_DATA = loadData(); // 设置全局共享data，避免子函数重复loadData产生副本
    var data = CMD_DATA;
    if (data.selectedClusterId < 0) { termPrint('[-] 请先选择服务器群', 'term-err'); CMD_DATA = null; return; }
    var c = getCluster(data, data.selectedClusterId);
    var target = data.selectedServerId ? getServer(c, data.selectedServerId) : null;

    switch(type) {
        case 'scan_all':
            termPrintCmd('nmap -sV -A ' + c.name + '/24');
            cmdNmapReal(c, ['-sV', '-A']);
            break;
        case 'exploit_auto':
            if (!target) { termPrint('[-] 请先选择一台服务器', 'term-err'); CMD_DATA = null; return; }
            var vuln = target.vulnerabilities[0] || 'rce';
            termPrintCmd('exploit ' + target.ip + ' --type=' + vuln);
            cmdExploitReal(target, vuln);
            break;
        case 'brute_force':
            if (!target) { termPrint('[-] 请先选择一台服务器', 'term-err'); CMD_DATA = null; return; }
            termPrintCmd('hydra -L users.txt -P rockyou.txt ' + target.ip + ' ' + target.serviceType.toLowerCase());
            cmdHydraReal(['-L', 'users.txt', '-P', 'rockyou.txt', target.ip, target.serviceType.toLowerCase()], data);
            break;
        case 'sql_inject':
            if (!target) { termPrint('[-] 请先选择一台服务器', 'term-err'); CMD_DATA = null; return; }
            termPrintCmd('sqlmap -u http://' + target.ip + '/ --batch --dbs');
            cmdSqlmapReal(['-u', 'http://' + target.ip + '/', '--batch', '--dbs'], data);
            break;
        case 'ddos':
            if (!target) { termPrint('[-] 请先选择一台服务器', 'term-err'); CMD_DATA = null; return; }
            termPrintCmd('hping3 --flood -S ' + target.ip);
            cmdDdosReal(target);
            break;
        case 'full_auto':
            if (!target) { termPrint('[-] 请先选择一台服务器', 'term-err'); CMD_DATA = null; return; }
            termPrintCmd('full_auto ' + target.ip);
            cmdFullAuto(target);
            break;
    }
}

function findServerByIp(data, ip) {
    if (!ip) return getSelectedServer();
    // 去除 http:// 前缀和路径
    ip = ip.replace(/^https?:\/\//, '').replace(/\/.*$/, '');
    for (var i = 0; i < data.clusters.length; i++) {
        var s = data.clusters[i].servers.find(function(sv){return sv.ip === ip;});
        if (s) return s;
    }
    return null;
}

// 获取服务器所属群
function getServerCluster(data, server) {
    for (var i = 0; i < data.clusters.length; i++) {
        if (data.clusters[i].servers.indexOf(server) >= 0) return data.clusters[i];
    }
    return null;
}

function cmdNmapReal(cluster, args) {
    if (!cluster) { termPrint('[-] 请先选择服务器群', 'term-err'); return; }
    var data = CMD_DATA || loadData(); // 使用parseCommand加载的同一份数据
    
    // 解析参数
    var doVersion = args.indexOf('-sV') >= 0 || args.indexOf('-A') >= 0;
    var doOS = args.indexOf('-O') >= 0 || args.indexOf('-A') >= 0;
    var doScript = false;
    var scriptName = '';
    args.forEach(function(a) {
        if (a.indexOf('--script') === 0) { doScript = true; if (a.indexOf('=')>0) scriptName = a.split('=')[1]; }
    });
    var portArg = null;
    args.forEach(function(a) { if (a.indexOf('-p')===0 && a.length>2) portArg = a.substring(2); });
    if (!portArg) { var pIdx = args.indexOf('-p'); if (pIdx>=0 && args[pIdx+1]) portArg = args[pIdx+1]; }
    
    // 确定扫描目标 — 从同一份data中查找
    var ipArg = args.find(function(a){return a.indexOf('10.')===0 || a.indexOf('/')>0;});
    var targets = [];
    if (ipArg && ipArg.indexOf('10.')===0) {
        var srv = findServerByIp(data, ipArg);
        if (srv) targets = [srv];
    }
    if (targets.length === 0) targets = cluster.servers.filter(function(s){return !s.isBroken;});
    if (targets.length === 0) { termPrint('[-] 该群所有服务器已攻破', 'term-warn'); return; }

    termPrint('Starting Nmap 7.92 ( https://nmap.org )', 'term-out');
    termPrint('Nmap scan report for ' + cluster.name + ' (' + (ipArg || cluster.name + '/24') + ')', 'term-info');
    termPrint('Host is up (0.00' + randInt(10,99) + 's latency).', 'term-out');
    termPrint('', 'term-out');
    
    if (doScript) {
        termPrint('Running script scan: ' + (scriptName || 'default'), 'term-info');
    }
    
    // 异步逐台扫描 — targets引用的是data中的同一对象
    targets.forEach(function(s, idx) {
        setTimeout(function() {
            var port = SERVICE_PORTS[s.serviceType] || 80;
            var ver = SERVICE_VERSIONS[s.serviceType] || ['unknown'];
            var version = ver[randInt(0, ver.length-1)];
            var extraPorts = '';
            
            // 高等级服务器开放更多端口
            if (s.level >= 5) {
                extraPorts = '\n22/tcp   open  ssh        ' + (SERVICE_VERSIONS['SSH'][randInt(0,2)]) + '\n';
                extraPorts += '21/tcp   open  ftp        ' + (SERVICE_VERSIONS['FTP'][randInt(0,2)]);
            }
            
            termPrint('Nmap scan report for ' + s.ip, 'term-info');
            termPrint('Host is up (' + (0.00 + Math.random()*0.05).toFixed(4) + 's latency).', 'term-out');
            termPrint('', 'term-out');
            termPrint('PORT     STATE SERVICE  VERSION', 'term-warn');
            termPrint(port + '/tcp   open  ' + (s.serviceType.toLowerCase()) + (doVersion ? '    ' + version : ''), 'term-out');
            if (extraPorts && doVersion) {
                extraPorts.split('\n').forEach(function(line) {
                    if (line.trim()) termPrint(line, 'term-out');
                });
            }
            
            if (doOS) {
                termPrint('', 'term-out');
                termPrint('OS detection: ' + s.os + ' (Linux ' + randInt(3,5) + '.' + randInt(0,19) + '.' + randInt(0,99) + ')', 'term-info');
                termPrint('OS CPE: cpe:/o:linux:linux_kernel:' + randInt(3,5) + '.' + randInt(0,19), 'term-dim');
                termPrint('Running: ' + s.os + ' ' + randInt(3,5) + '.X', 'term-dim');
                termPrint('OS details: ' + s.os + ' ' + randInt(3,5) + '.' + randInt(0,19) + ' (' + (s.os==='Windows Server'?'Microsoft':'Linux') + ')', 'term-out');
            }
            
            if (doScript) {
                termPrint('', 'term-out');
                termPrint('|_script-vuln: ' + s.vulnerabilities.length + ' potential vulnerabilities found', 'term-warn');
                s.vulnerabilities.forEach(function(v) {
                    var cv = VULN_CVE_MAP[v] || {cve:'CVE-2024-'+randInt(1000,9999), name:v};
                    termPrint('| ' + cv.cve + ' - ' + cv.name, 'term-out');
                    termPrint('|_  State: VULNERABLE (CVSS ' + (5 + s.level).toFixed(1) + ')', 'term-dim');
                });
            }
            
            s.reconDone = true; // 修改的是data中的同一对象引用
            termPrint('', 'term-out');
            
            if (idx === targets.length - 1) {
                termPrint('Nmap done: ' + targets.length + ' IP address(es) scanned in ' + (1 + Math.random()*3).toFixed(2) + ' seconds', 'term-ok');
                termPrint('[+] 侦察完成！选中服务器查看详细漏洞', 'term-ok');
                // Phase 4: 0day漏洞发现
                tryZeroDayDiscovery(data, cluster);
                saveData(data); // 保存同一份data
                renderClusterView(data);
                renderStats(data);
                CMD_DATA = null;
            }
        }, idx * 200);
    });
}

// ===== 成功率计算 =====
function calcSuccessRate(server, data, attackType) {
    var base = 50;
    var atkBonus = Math.min(30, Math.floor(data.player.attackPower / Math.max(1, server.defense) * 20));
    var lvlPenalty = server.level * 3;
    var rate = base + atkBonus - lvlPenalty;

    var cluster = getServerCluster(data, server);
    if (cluster && data.fbi.protectedClusters.indexOf(cluster.id) >= 0) {
        var tunnelBroken = data.tunnel && data.tunnel.isBroken;
        // 隧道破后FBI保护削弱70%：-20% → -6%
        rate -= tunnelBroken ? 6 : 20;
        // 蜜罐：隧道破后永久失效，-60% → 0
        if (data.fbi.honeypotActive && !tunnelBroken) rate -= 60;
    }

    // 强制修复防御buff：成功率降低到10%
    if (server.forceRepairBuff > 0) {
        rate = Math.floor(rate * 0.1);
    }

    if (attackType === 'sql_injection' && server.serviceType === 'Database') rate += 15;
    if (attackType === 'weak_ssh' && server.serviceType === 'SSH') rate += 15;
    if (attackType === 'weak_ftp' && server.serviceType === 'FTP') rate += 15;
    if (attackType === 'rce') rate += 5;
    if (attackType === 'default_pass') rate += 10;

        // Phase 3: 活跃病毒加成
    var activeVirusBonus = (data.activeViruses || []).length * 3;
    rate += activeVirusBonus;
    // Phase 4: 0day漏洞加成
    var unusedZeroDays = (data.zeroDays || []).filter(function(zd){ return !zd.used && !zd.sold && zd.expiryRound > (data.currentRound || 0); });
    if (unusedZeroDays.length > 0) {
        var best = unusedZeroDays[0];
        var gOrder = {Critical:4, High:3, Medium:2, Low:1};
        for (var z = 1; z < unusedZeroDays.length; z++) {
            if ((gOrder[unusedZeroDays[z].grade] || 0) > (gOrder[best.grade] || 0)) best = unusedZeroDays[z];
        }
        rate += (ZERODAY_GRADES[best.grade] || {successBonus:0}).successBonus;
    }
    // Phase 5: 黑市工具加成
    try {
        var investRaw4 = localStorage.getItem('investSimState_v13');
        if (investRaw4) {
            var investSt4 = JSON.parse(investRaw4);
            var hackTools = investSt4.hackTools || [];
            hackTools.forEach(function(t) {
                if (t.id === 'vuln_scanner' && t.usesLeft > 0) rate += 8;
                if (t.id === 'pass_cracker' && t.usesLeft > 0 && (attackType === 'weak_ssh' || attackType === 'weak_ftp' || attackType === 'default_pass')) rate += 12;
                if (t.id === 'traffic_obfuscator' && t.usesLeft > 0) rate += 5;
                if (t.id === 'exploit_framework' && t.usesLeft > 0) rate += 10;
            });
        }
    } catch(e) {}
    return clamp(rate, 5, 95);
}

}

function cmdHydraReal(args, data) {

    var ip = args.find(function(a){return a.indexOf('10.')===0;});
    var service = args.find(function(a){return ['ssh','ftp','http','mysql','rdp','smb','telnet'].indexOf(a)>=0;});
    if (!ip) { termPrint('[-] hydra: missing target host', 'term-err'); return; }
    
    var server = findServerByIp(data, ip);
    if (!server) { termPrint('[-] hydra: target ' + ip + ' not found', 'term-err'); return; }
    if (!server.reconDone) { termPrint('[-] 请先 nmap 扫描目标', 'term-err'); return; }
    if (server.isBroken) { termPrint('[*] 该服务器已被攻破', 'term-warn'); return; }

    if (!service) service = (server.serviceType || 'ssh').toLowerCase();
    var threads = 4;
    var tIdx = args.indexOf('-t');
    if (tIdx >= 0 && args[tIdx+1]) threads = parseInt(args[tIdx+1], 10) || 4;
    var stopOnSuccess = args.indexOf('-f') >= 0;
    var cluster = getServerCluster(data, server);

    termPrint('Hydra v9.3 (c) 2022 by van Hauser/THC & David Maciejak', 'term-info');
    termPrint('', 'term-out');
    termPrint('[DATA] max ' + threads + ' tasks per 1 server, overall ' + threads + ' tasks', 'term-out');
    termPrint('[DATA] attacking ' + service + '://' + server.ip + ':22/', 'term-out');
    termPrint('[DATA] loading usernames from users.txt', 'term-dim');
    termPrint('[DATA] loading passwords from rockyou.txt', 'term-dim');
    termPrint('[INFO] 14344391 password entries loaded', 'term-dim');
    termPrint('', 'term-out');

    var rate = calcSuccessRate(server, data, server.vulnerabilities.indexOf('default_pass')>=0 ? 'default_pass' : 'weak_ssh');
    if (server.serviceType.toLowerCase() === service.toUpperCase()) rate += 15;
    rate = clamp(rate, 5, 95);

    // 模拟爆破过程
    var attempts = 0;
    var maxAttempts = 8;
    var cracked = Math.random() * 100 < rate;
    var crackUser = ['admin', 'root', 'postgres', 'www-data', 'test'][randInt(0,4)];
    // lgtm[hardcoded-password] CodeQL-ignore: game simulation brute-force dictionary, not real credentials
    var crackPass = ['admin123', 'password', '12345678', 'P@ssw0rd', 'root', 'admin', 'qwerty'][randInt(0,6)];
    
    var attemptInterval = setInterval(function() {
        attempts++;
        var testUser = ['admin', 'root', 'user', 'test', 'postgres', 'guest'][randInt(0,5)];
        // lgtm[hardcoded-password] CodeQL-ignore: game simulation brute-force dictionary, not real credentials
        var testPass = ['123456', 'password', 'admin', 'root', 'qwerty', 'letmein', 'welcome'][randInt(0,6)];
        
        if (attempts < maxAttempts && (!stopOnSuccess || !cracked)) {
            termPrint('[' + attempts + '][' + service + '] host: ' + server.ip + '   login: ' + testUser + '   password: ' + testPass + '  [-] FAIL', 'term-err');
        }
        
        if (attempts >= maxAttempts || (stopOnSuccess && cracked && attempts >= 3)) {
            clearInterval(attemptInterval);
            if (cracked) {
                termPrint('[' + (attempts+1) + '][' + service + '] host: ' + server.ip + '   login: ' + crackUser + '   password: ' + crackPass + '  [+] SUCCESS', 'term-ok');
                termPrint('[+] Cracked! Credentials: ' + crackUser + ':' + crackPass, 'term-ok');
                termPrint('[+] ' + attempts + ' of 14344391 completed. Valid password found.', 'term-ok');
                
                var damage = Math.floor(server.maxHp * (0.35 + Math.random() * 0.35));
                var frChk = checkForceRepair(server, data);
                if (frChk.blocked) {
                    termPrint('[!] FBI FORCE REPAIR SHIELD: Attack blocked! (70% defense)', 'term-err');
                    termPrint('[*] 服务器处于强制修复保护中，剩余 ' + server.forceRepairBuff + ' 回合', 'term-warn');
                    addLog(data, 'fbi', '🛡️ 强制修复护盾拦截攻击: ' + server.name);
                    saveData(data); renderClusterView(data); renderStats(data); CMD_DATA = null;
                    return;
                }
                if (frChk.reduced) {
                    damage = Math.floor(damage * frChk.damageMul);
                    termPrint('[!] FBI强制修复防护：伤害减免90%！实际伤害 ' + damage, 'term-warn');
                }
                server.hp = Math.max(0, server.hp - damage);
                termPrint('[+] Shell access obtained via ' + service, 'term-ok');
                termPrint('[+] Damage dealt: ' + damage + ' HP', 'term-ok');
                
                if (server.hp <= 0) {
                    markServerBroken(data, server, getServerCluster(data, server));
                    termPrint('[★] ' + server.name + ' COMPROMISED via credential brute force!', 'term-ok');
                    addLog(data, 'broken', server.name + ' 通过密码爆破 (' + crackUser + ':' + crackPass + ') 被攻破！');
                    checkClusterBroken(data, cluster);
                }
            } else {
                termPrint('[ERROR] all passwords were found unsuccessful', 'term-err');
                termPrint('[-] ' + attempts + ' of 14344391 completed. No valid password found.', 'term-err');
                termPrint('[*] Target may have rate limiting or strong password policy', 'term-warn');
            }
            saveData(data);
            renderClusterView(data);
            renderStats(data);
        }
    }, 300);
}

// ===== 检测服务器群是否被完全攻破 =====
function checkClusterBroken(data, cluster) {
    if (!cluster) return;
    var allBroken = cluster.servers.every(function(s){return s.isBroken;});
    if (allBroken && !cluster.isOwned) {
        cluster.isOwned = true;
        cluster.ownedSince = data.currentRound;
        data.player.ownedClusters.push(cluster.id);
        addLog(data, 'system', '🏭 ' + cluster.name + ' 全部攻破！已占领，成为僵尸网络节点！');
        termPrint('[★] ' + cluster.name + ' 全部攻破！已占领为僵尸网络！', 'term-ok');
    }
    saveData(data);
}

// ===== 自动指挥状态 =====
var AUTO_ATTACK = {
    active: false,
    srcId: null,
    tgtId: null,
    atkType: 'exploit',
    intervalId: null,
    roundCount: 0
};

function startAutoAttack() {
    var srcId = parseInt(document.getElementById('bnAutoSource').value, 10);
    var tgtId = parseInt(document.getElementById('bnAutoTarget').value, 10);
    var atkType = document.getElementById('bnAutoType').value;
    if (!srcId || !tgtId) { alert('请先选择攻击源群和目标群'); return; }
    if (srcId === tgtId) { alert('攻击源和目标不能相同'); return; }

    AUTO_ATTACK.active = true;
    AUTO_ATTACK.srcId = srcId;
    AUTO_ATTACK.tgtId = tgtId;
    AUTO_ATTACK.atkType = atkType;
    AUTO_ATTACK.roundCount = 0;

    var data = loadData();
    addLog(data, 'botnet', '🤖 自动指挥启动: ' + (getCluster(data, srcId)||{name:'?'}).name + ' → ' + (getCluster(data, tgtId)||{name:'?'}).name + ' [' + atkType + ']');
    saveData(data);
    renderBotnet(data);

    // 立即执行第一轮
    autoBotnetRound();

    // 每1.5秒一轮
    AUTO_ATTACK.intervalId = setInterval(function() {
        if (!AUTO_ATTACK.active) { clearInterval(AUTO_ATTACK.intervalId); return; }
        autoBotnetRound();
    }, 1500);
}

function stopAutoAttack() {
    if (AUTO_ATTACK.intervalId) clearInterval(AUTO_ATTACK.intervalId);
    AUTO_ATTACK.active = false;
    var data = loadData();
    addLog(data, 'botnet', '⏹ 自动指挥已停止（共执行 ' + AUTO_ATTACK.roundCount + ' 轮）');
    saveData(data);
    renderBotnet(data);
}

function autoBotnetRound() {
    var data = loadData();
    var src = getCluster(data, AUTO_ATTACK.srcId);
    var tgt = getCluster(data, AUTO_ATTACK.tgtId);

    // 检查源群是否还是我方占领
    if (!src || !src.isOwned) {
        addLog(data, 'botnet', '⚠ 自动指挥中止: 攻击源群已不可用');
        saveData(data);
        clearInterval(AUTO_ATTACK.intervalId);
        AUTO_ATTACK.active = false;
        renderBotnet(data);
        return;
    }

    // 检查目标群是否已全部攻破
    var remaining = tgt ? tgt.servers.filter(function(s){ return !s.isBroken; }) : [];
    if (!tgt || remaining.length === 0) {
        addLog(data, 'botnet', '🎉 自动指挥完成！' + (tgt ? tgt.name : '目标群') + ' 已全部占领！共执行 ' + AUTO_ATTACK.roundCount + ' 轮');
        saveData(data);
        clearInterval(AUTO_ATTACK.intervalId);
        AUTO_ATTACK.active = false;
        renderBotnet(data);
        renderStats(data);
        renderTopology(data);
        return;
    }

    // 检查连接
    if (src.connections.indexOf(AUTO_ATTACK.tgtId) < 0) {
        addLog(data, 'botnet', '⚠ 自动指挥中止: ' + src.name + ' 与 ' + tgt.name + ' 不直接相连');
        saveData(data);
        clearInterval(AUTO_ATTACK.intervalId);
        AUTO_ATTACK.active = false;
        renderBotnet(data);
        return;
    }

    AUTO_ATTACK.roundCount++;

    var totalLevel = src.servers.reduce(function(sum, s){ return sum + s.level; }, 0);
    var attackPower = totalLevel * 2;

    // 每轮攻击HP最低的目标
    remaining.sort(function(a, b){ return a.hp - b.hp; });
    var target = remaining[0];

    var damage = Math.floor(attackPower * (0.3 + Math.random() * 0.4));
    target.hp = Math.max(0, target.hp - damage);

    var msg = '[R' + AUTO_ATTACK.roundCount + '] ' + src.name + '→' + tgt.name + ' [' + AUTO_ATTACK.atkType + '] 攻击 ' + target.name + ' 造成 ' + damage + ' 伤害';
    if (target.hp <= 0) {
        markServerBroken(data, target, getServerCluster(data, target));
        msg += ' 【攻破！剩余 ' + (remaining.length - 1) + ' 台】';
        checkClusterBroken(data, tgt);
    }
    addLog(data, 'botnet', msg);
    data.player.hackTraceScore += 1;
    saveData(data);

    // 刷新UI
    var tab = document.getElementById('botnetView');
    if (tab && tab.closest('.tab-content') && !tab.closest('.tab-content').classList.contains('hidden')) {
        renderBotnet(data);
    }
    renderStats(data);
}

function manualBotnetAttack() {

    // 检查连接
    if (src.connections.indexOf(tgtId) < 0) {
        addLog(data, 'botnet', '攻击失败: ' + src.name + ' 与 ' + tgt.name + ' 不直接相连');
        saveData(data);
        renderBotnet(data);

    // 选择目标群中HP最低的非攻破服务器
    var targets = tgt.servers.filter(function(s){return !s.isBroken;});
    if (targets.length === 0) {
        addLog(data, 'botnet', '目标群已全部攻破');
        saveData(data);
        renderBotnet(data);
        return;
    }
    targets.sort(function(a, b){return a.hp - b.hp;});

    target.hp = Math.max(0, target.hp - damage);

        checkClusterBroken(data, tgt);

    addLog(data, 'botnet', msg);

function tunnelTermPrint(msg, cls) {

function tunnelTermPrintCmd(cmd) {
    tunnelTermPrint('$ ' + cmd, 'term-cmd');
}

function executeTunnelCmd() {
    var input = document.getElementById('tunnelCmdInput');
    if (!input) return;
    var cmd = input.value.trim();
    input.value = '';
    if (!cmd) return;
    tunnelTermPrintCmd(cmd);
    var parts = cmd.split(/\s+/);
    var main = parts[0].toLowerCase();
    switch(main) {
        case 'help': case '?':
            tunnelTermPrint('=== 隧道攻击命令 ===', 'term-warn');
            tunnelTermPrint('  nmap -sV -A          扫描隧道', 'term-out');
            tunnelTermPrint('  exploit <vuln>       漏洞利用攻击', 'term-out');
            tunnelTermPrint('  hping3 --flood       DDoS洪水攻击', 'term-out');
            tunnelTermPrint('  full_auto            全自动攻击', 'term-out');
            tunnelTermPrint('  clear                清屏', 'term-out');
            break;
        case 'nmap': case 'scan':
            cmdTunnelNmap();
            break;
        case 'exploit':
            cmdTunnelExploit(parts[1] || 'auto');
            break;
        case 'hping3': case 'ddos':
            cmdTunnelDdos();
            break;
        case 'full_auto': case 'auto':
            cmdTunnelFullAuto();
            break;
        case 'clear': case 'cls':
            TUNNEL_TERM.innerHTML = '';
            break;
        default:
            tunnelTermPrint('Unknown command: ' + main, 'term-err');
            tunnelTermPrint('输入 help 查看可用命令', 'term-dim');
    }
}

function tunnelQuickCmd(type) {

}

// ===== FBI强制性修复 =====
function executeForceRepair(data) {
    // 1. 收集所有群中已攻破的服务器，按群分组
    var brokenByCluster = [];
    data.clusters.forEach(function(c) {
        var broken = c.servers.filter(function(s) { return s.isBroken; });
        if (broken.length > 0) {
            brokenByCluster.push({ cluster: c, servers: broken });
        }
    });
    if (brokenByCluster.length === 0) return;

    // 2. 随机打乱，从不同群各选1台，最多3台
    var shuffled = shuffleArr(brokenByCluster);
    var repairTargets = [];
    for (var i = 0; i < Math.min(3, shuffled.length); i++) {
        var entry = shuffled[i];
        var picked = entry.servers[randInt(0, entry.servers.length - 1)];
        repairTargets.push({ server: picked, cluster: entry.cluster });
    }

    // 3. 执行修复
    var repairedNames = [];
    repairTargets.forEach(function(t) {
        t.server.isBroken = false;
        t.server.hp = t.server.maxHp;
        t.server.reconDone = false;
        t.server.forceRepairBuff = 3;
        t.server.forceRepairDefense = 0.9;
        repairedNames.push(t.cluster.name + '/' + t.server.name);
    });
    addLog(data, 'fbi', '🔧 FBI强制性修复：修复了 ' + repairedNames.join(', ') + ' (90%防御buff 3回合)');

    // 4. 检查被修复的群是否有超过3台服务器被修复 → 失去控制权 + 加入FBI保护群
    var checkedClusters = {};
    repairTargets.forEach(function(t) {
        if (checkedClusters[t.cluster.id]) return;
        checkedClusters[t.cluster.id] = true;
        var repairedCount = t.cluster.servers.filter(function(s) { return !s.isBroken; }).length;
        if (repairedCount > 3 && t.cluster.isOwned) {
            t.cluster.isOwned = false;
            t.cluster.ownedSince = null;
            var idx = data.player.ownedClusters.indexOf(t.cluster.id);
            if (idx >= 0) data.player.ownedClusters.splice(idx, 1);
            // 加入FBI保护群
            if (data.fbi.protectedClusters.indexOf(t.cluster.id) < 0) {
                data.fbi.protectedClusters.push(t.cluster.id);
            }
            addLog(data, 'fbi', '🔴 ' + t.cluster.name + ' 有' + repairedCount + '台服务器被FBI修复！超过3台，玩家失去控制权，群变为FBI保护群！');
        }
    });
}

// ===== 回合处理 =====
function processRound() {
    var data = loadData();
    var lastRound = data.currentRound;
    var hackRound = parseInt(localStorage.getItem(ROUND_KEY) || '0', 10);

    if (hackRound <= lastRound) return; // 没有新回合
    var roundsToProcess = Math.min(hackRound - lastRound, 10); // 最多处理10回合

    for (var r = 0; r < roundsToProcess; r++) {
        data.currentRound = lastRound + r + 1;

        // 1. 僵尸网络自动攻击
        var ownedClusters = data.clusters.filter(function(c){return c.isOwned;});
        ownedClusters.forEach(function(c) {
            // 找一个相连的未占领群
            var targets = c.connections.map(function(cid){return getCluster(data, cid);}).filter(function(t){return t && !t.isOwned;});
            if (targets.length === 0) return;
            var target = targets[randInt(0, targets.length-1)];
            var availServers = target.servers.filter(function(s){return !s.isBroken;});
            if (availServers.length === 0) return;
            var srv = availServers[randInt(0, availServers.length-1)];
            var totalLevel = c.servers.reduce(function(sum, s){return sum + s.level;}, 0);
            var damage = Math.floor(totalLevel * 2 * (0.2 + Math.random() * 0.3));
            // 僵尸网络也受强制修复buff影响
            var frChk = checkForceRepair(srv, data);
            if (!frChk.blocked) {
                damage = Math.floor(damage * frChk.damageMul);
                srv.hp = Math.max(0, srv.hp - damage);
            } else {
                damage = 0;
            }
            var msg = c.name + ' 自动攻击 ' + target.name + '/' + srv.name;
            if (frChk.blocked) {
                msg += ' · 被FBI修复护盾拦截！';
            } else if (frChk.reduced) {
                msg += ' · 修复buff减伤90%，造成' + damage + '伤害';
            } else {
                msg += ' 造成' + damage + '伤害';
            }
            if (srv.hp <= 0) {
                markServerBroken(data, srv, getServerCluster(data, srv));
                msg += ' · 攻破！';
                checkClusterBroken(data, target);
            }
            addLog(data, 'botnet', msg);
            data.player.hackTraceScore += 1;
        });

        // 2. FBI扫描（每2回合扫描一次）
        if (data.currentRound % 2 === 0 && !data.fbi.active && !data.fbi.defeated) {
            var detectRate = countBrokenServers(data) * 2;
            if (data.fbi.scanBoostEnds > data.currentRound) detectRate *= 2; // 蜜罐翻倍
            if (Math.random() * 100 < detectRate) {
                data.fbi.active = true;
                // FBI保护1~2个未占领群
                var unprotected = data.clusters.filter(function(c){return !c.isOwned;});
                var protectCount = Math.min(randInt(1, 2), unprotected.length);
                var shuffled = shuffleArr(unprotected);
                data.fbi.protectedClusters = shuffled.slice(0, protectCount).map(function(c){return c.id;});
                addLog(data, 'fbi', '🚨 FBI介入！保护 ' + protectCount + ' 个服务器群');
            }
        } else if (data.fbi.active && data.currentRound % 2 === 0) {
            // 检查是否开启蜜罐（隧道攻破后蜜罐永久失效，无法再激活）
            if (!data.fbi.honeypotActive && !(data.tunnel && data.tunnel.isBroken) && calcPlayerAttack(data) > 100) {
                data.fbi.honeypotActive = true;
                addLog(data, 'fbi', '🍯 FBI开启蜜罐系统！玩家攻击力>100');
            }
            // FBI更新保护目标
            if (data.currentRound % 5 === 0) {
                var prot = data.clusters.filter(function(c){return !c.isOwned;});
                var pc = Math.min(randInt(1, 2), prot.length);
                data.fbi.protectedClusters = shuffleArr(prot).slice(0, pc).map(function(c){return c.id;});
                addLog(data, 'fbi', 'FBI更新保护目标');
            }
        }

        // 3. FBI冷却恢复
        if (data.fbi.defeated && data.fbi.defeatCooldown > 0) {
            data.fbi.defeatCooldown--;
            if (data.fbi.defeatCooldown <= 0) {
                data.fbi.defeated = false;
                data.fbi.active = false;
                addLog(data, 'fbi', 'FBI冷却结束，可重新触发');
            }
        }

        // 4. FBI强制性修复（全占领时每回合执行，不受2回合限制）
        var allClustersOwned = data.clusters.every(function(c) { return c.isOwned; });
        if (allClustersOwned && !data.fbi.forceRepairActive) {
            data.fbi.forceRepairActive = true;
            addLog(data, 'fbi', '⚠ FBI启动「强制性修复」协议！全服务器群被占领，每回合修复3台！');
        }
        if (!allClustersOwned && data.fbi.forceRepairActive) {
            data.fbi.forceRepairActive = false;
            addLog(data, 'fbi', 'FBI强制性修复暂停：不再全占领');
        }
        if (data.fbi.forceRepairActive && !data.fbi.defeated) {
            executeForceRepair(data);
        }

        // 6. 病毒持续时间递减
        if (data.activeViruses && data.activeViruses.length > 0) {
            data.activeViruses = data.activeViruses.filter(function(av) {
                av.duration--;
                return av.duration > 0;
            });
        }
        // 7. 0day过期处理
        if (data.zeroDays && data.zeroDays.length > 0) {
            data.zeroDays.forEach(function(zd) {
                if (zd.expiryRound <= data.currentRound && !zd.used && !zd.sold) {
                    addLog(data, 'system', '💎 0day漏洞 ' + zd.name + ' (' + zd.grade + ') 已过期，被厂商修补');
                }
            });
            data.zeroDays = data.zeroDays.filter(function(zd) {
                return zd.expiryRound > data.currentRound || zd.used || zd.sold;
            });
        }
        // 8. NPC买家刷新 (每5回合)
        if (data.currentRound % 5 === 0 && data.zeroDayBuyers) {
            data.zeroDayBuyers.forEach(function(b) {
                b.budget = (b.budget * (0.8 + Math.random() * 0.4)).toFixed(2);
                b.refreshRound = data.currentRound;
            });
        }

        // 5. 强制修复buff递减
        data.clusters.forEach(function(c) {
            c.servers.forEach(function(s) {
                if (s.forceRepairBuff > 0) {
                    s.forceRepairBuff--;
                    if (s.forceRepairBuff <= 0) {
                        s.forceRepairDefense = 0;
                    }
                }
            });
        });
    }

    saveData(data);
    renderStats(data);
    // 刷新当前tab
    var activeTab = document.querySelector('.tab-btn.active');
    if (activeTab) activeTab.click();
}

// ====== Phase 3: 病毒研发 ======
function startVirusResearch(virusId) {
    var data = loadData();
    var vt = VIRUS_TYPES.find(function(v){return v.id === virusId;});
    if (!vt) return;
    
    // 检查BTC
    var investRaw = localStorage.getItem('investSimState_v13');
    var btc = 0;
    try {
        var invSt = JSON.parse(investRaw);
        var crypto = (invSt.assets || []).find(function(a){return a.id === 'crypto';});
        btc = crypto ? crypto.holding : 0;
    } catch(e) {}
    
    if (btc < vt.devCostBTC) {
        alert('BTC不足！需要 ₿' + vt.devCostBTC.toFixed(3) + '，当前 ₿' + btc.toFixed(4));
        return;
    }
    
    // 扣款
    try {
        var invSt2 = JSON.parse(localStorage.getItem('investSimState_v13'));
        var crypto2 = invSt2.assets.find(function(a){return a.id === 'crypto';});
        if (crypto2) crypto2.holding -= vt.devCostBTC;
        localStorage.setItem('investSimState_v13', JSON.stringify(invSt2));
    } catch(e) {}
    
    data.researchingVirus = virusId;
    data.virusResearchRounds = vt.devRounds;
    addLog(data, 'system', '🦠 开始研发 ' + vt.name + ' (成本 ₿' + vt.devCostBTC.toFixed(3) + ', 需要 ' + vt.devRounds + ' 回合)');
    saveData(data);
    renderVirus(data);
    renderStats(data);
}

// ====== Phase 3: 攻击时触发病毒部署 ======
function tryDeployVirus(data, server) {
    if (!data.pendingVirus) return false;
    var pv = data.pendingVirus;
    var vt = VIRUS_TYPES.find(function(v){return v.id === pv.virusId;});
    if (!vt) return false;
    
    // 感染率判定
    var infectChance = vt.infectRate;
    // 服务器等级越高越难感染
    infectChance -= server.level * 0.03;
    infectChance = Math.max(0.1, infectChance);
    
    if (Math.random() < infectChance) {
        data.activeViruses = data.activeViruses || [];
        data.activeViruses.push({
            virusId: pv.virusId,
            virusName: pv.name,
            targetServerId: server.id,
            deployRound: data.currentRound,
            duration: 3
        });
        addLog(data, 'system', '🦠 ' + pv.name + ' 成功感染 ' + server.name + '！(+' + Math.round(vt.damage*0.3) + ' 额外伤害)');
        termPrint('[🦠] ' + pv.name + ' 感染成功！额外伤害 +' + Math.round(vt.damage*0.3), 'term-warn');
        data.pendingVirus = null;
        saveData(data);
        return true;
    } else {
        termPrint('[-] ' + pv.name + ' 感染失败（服务器防御过强）', 'term-err');
        data.pendingVirus = null;
        saveData(data);
        return false;
    }
}

// ====== Phase 4: 0day漏洞发现 ======
function tryZeroDayDiscovery(data, cluster) {
    if (!cluster) return;
    
    // 基础发现概率
    var baseChance = 0.50;
    // 世界服务器工具加成
    try {
        var raw = localStorage.getItem('investSimState_v13');
        if (raw) {
            var st = JSON.parse(raw);
            var wsTools = st.wsTools || {};
            baseChance += (wsTools.zeroDayChance || 0) * 0.01;
        }
    } catch(e) {}
    
    // 已被发现的0day数量越多，发现新0day概率越低
    var existingCount = (data.zeroDays || []).length;
    baseChance *= Math.max(0.1, 1 - existingCount * 0.15);
    
    if (Math.random() > baseChance) return;
    
    // 确定等级
    var grades = ['Critical', 'High', 'Medium', 'Low'];
    var weights = [0.1, 0.25, 0.35, 0.3];
    var totalW = weights.reduce(function(a,b){return a+b;},0);
    var r = Math.random() * totalW;
    var cumu = 0;
    var grade = 'Low';
    for (var g = 0; g < grades.length; g++) {
        cumu += weights[g];
        if (r <= cumu) { grade = grades[g]; break; }
    }
    
    var gInfo = ZERODAY_GRADES[grade];
    // 生成漏洞名称
    var targetTypes = Object.keys(ZERODAY_NAMES_BY_TARGET);
    var targetType = targetTypes[randInt(0, targetTypes.length-1)];
    var names = ZERODAY_NAMES_BY_TARGET[targetType];
    var zdName = names[randInt(0, names.length-1)];
    var cveNum = 'CVE-2026-' + randInt(1000, 99999);
    
    var zeroDay = {
        id: 'zd_' + Date.now() + '_' + randInt(0,9999),
        cve: cveNum,
        name: zdName,
        grade: grade,
        discoveredRound: data.currentRound,
        expiryRound: data.currentRound + gInfo.decayRounds,
        used: false,
        sold: false,
        targetType: targetType,
        successBonus: gInfo.successBonus,
        valueBTC: gInfo.valueBase * (0.8 + Math.random() * 0.4)
    };
    
    data.zeroDays.push(zeroDay);
    addLog(data, 'system', '💎 发现0day漏洞！' + zdName + ' [' + grade + '] ' + cveNum + ' (有效期 ' + gInfo.decayRounds + ' 回合)');
    termPrint('', 'term-out');
    termPrint('[💎] *** 0DAY VULNERABILITY DISCOVERED! ***', 'term-ok');
    termPrint('[💎] ' + zeroDay.cve + ' - ' + zeroDay.name, 'term-ok');
    termPrint('[💎] Grade: ' + grade + ' | Success Bonus: +' + gInfo.successBonus + '%', 'term-ok');
    termPrint('[💎] Market Value: ₿' + zeroDay.valueBTC.toFixed(4), 'term-ok');
    termPrint('[💎] Expires in ' + gInfo.decayRounds + ' rounds', 'term-warn');
    saveData(data);
}

// ====== Phase 4: 攻击时使用0day（已集成到 calcSuccessRate） ======
// 攻击成功后标记0day为已使用
function consumeZeroDayOnSuccess(data) {
    var unusedZeroDays = (data.zeroDays || []).filter(function(zd){ return !zd.used && !zd.sold && zd.expiryRound > (data.currentRound || 0); });
    if (unusedZeroDays.length > 0) {
        var best = unusedZeroDays[0];
        var gOrder = {Critical:4, High:3, Medium:2, Low:1};
        for (var z = 1; z < unusedZeroDays.length; z++) {
            if ((gOrder[unusedZeroDays[z].grade] || 0) > (gOrder[best.grade] || 0)) best = unusedZeroDays[z];
        }
        // 0day使用后有50%概率被发现/修复（不再可用）
        if (Math.random() < 0.5) {
            best.used = true;
            addLog(data, 'system', '💎 0day ' + best.name + ' 已被使用并暴露，漏洞失效');
        }
    }
}

// ====== Phase 5: 黑市工具在攻击中的消耗 ======
function consumeHackToolOnAttack(toolType) {
    try {
        var raw = localStorage.getItem('investSimState_v13');
        if (!raw) return;
        var st = JSON.parse(raw);
        var tools = st.hackTools || [];
        var found = tools.find(function(t){return t.id === toolType && t.usesLeft > 0;});
        if (found) {
            found.usesLeft--;
            if (found.usesLeft <= 0) {
                // 移除耗尽工具
                st.hackTools = tools.filter(function(t){return t.id !== toolType || t.usesLeft > 0;});
            }
            localStorage.setItem('investSimState_v13', JSON.stringify(st));
        }
    } catch(e) {}
}

// ====== 辅助：消费任意一个持有工具 ======
function consumeAnyHackTool() {
    try {
        var raw = localStorage.getItem('investSimState_v13');
        if (!raw) return;
        var st = JSON.parse(raw);
        var tools = (st.hackTools || []).filter(function(t) { return t.usesLeft > 0; });
        if (tools.length === 0) return;
        var pick = tools[Math.floor(Math.random() * tools.length)];
        pick.usesLeft--;
        var idx = st.hackTools.findIndex(function(t) { return t.id === pick.id; });
        if (idx >= 0) {
            if (pick.usesLeft <= 0) {
                st.hackTools.splice(idx, 1);
            } else {
                st.hackTools[idx].usesLeft = pick.usesLeft;
            }
        }
        localStorage.setItem('investSimState_v13', JSON.stringify(st));
    } catch(e) {}
}

// ====== 闭环功能：自动挖掘碎片系统 ======

// Fragment grade table: price in BTC per fragment
var FRAGMENT_GRADE_PRICES = { S: 0.5, A: 0.3, B: 0.15, C: 0.06, D: 0.02 };
var FRAGMENT_GRADE_NAMES = { S: '绝密', A: '机密', B: '核心', C: '普通', D: '基础' };
var FRAGMENT_GRADE_WEIGHTS = { S: 0.05, A: 0.12, B: 0.22, C: 0.3, D: 0.31 };

// DARKNET_PENDING_FRAGMENTS 中转 Key
var DARKNET_PENDING_KEY = 'darknetPendingFragments_v13';

/**
 * 扫描所有已攻破的服务器，返回可挖掘的碎片列表
 */
function scanBrokenServers(data) {
    var broken = [];
    data.clusters.forEach(function(c) {
        c.servers.forEach(function(s) {
            if (s.isBroken && !s._minedThisSession) {
                broken.push({ server: s, cluster: c });
            }
        });
    });
    return broken;
}

/**
 * 为服务器生成随机等级碎片
 */
function generateMineFragment(server, cluster, data) {
    var tier = 'C';
    var roll = Math.random();
    if (roll < FRAGMENT_GRADE_WEIGHTS.S) tier = 'S';
    else if (roll < FRAGMENT_GRADE_WEIGHTS.S + FRAGMENT_GRADE_WEIGHTS.A) tier = 'A';
    else if (roll < FRAGMENT_GRADE_WEIGHTS.S + FRAGMENT_GRADE_WEIGHTS.A + FRAGMENT_GRADE_WEIGHTS.B) tier = 'B';
    else if (roll < FRAGMENT_GRADE_WEIGHTS.S + FRAGMENT_GRADE_WEIGHTS.A + FRAGMENT_GRADE_WEIGHTS.B + FRAGMENT_GRADE_WEIGHTS.C) tier = 'C';
    else tier = 'D';

    var serverLevelBonus = Math.min(server.level * 0.03, 0.15);
    if (tier === 'D' && Math.random() < serverLevelBonus) tier = 'C';
    if (tier === 'C' && Math.random() < serverLevelBonus) tier = 'B';

    return {
        id: 'frag_' + Date.now() + '_' + Math.floor(Math.random() * 10000),
        grade: tier,
        gradeName: FRAGMENT_GRADE_NAMES[tier],
        valueBTC: FRAGMENT_GRADE_PRICES[tier],
        serverName: server.name,
        serverIP: server.ip,
        clusterName: cluster.name,
        clusterTheme: cluster.theme,
        dataType: FRAGMENT_TYPE_MAP[cluster.name] || '未知数据',
        minedAtRound: data.currentRound,
        minedAtTime: now()
    };
}

/**
 * 开始自动挖掘
 */
function startAutoMining() {
    var data = loadData();
    var ms = data.mineState;
    var broken = scanBrokenServers(data);

    if (broken.length === 0) {
        alert('没有可挖掘的服务器！请先攻破更多服务器。');
        return;
    }

    ms.active = true;
    ms.progress = 0;
    ms.total = broken.length;
    if (!ms.results) ms.results = [];
    saveData(data);

    addLog(data, 'system', '⛏️ 开始自动挖掘 ' + broken.length + ' 台服务器...');
    renderAutoMine(data);

    // Animated mining: process servers one by one
    function mineNext() {
        var d = loadData();
        var m = d.mineState;
        if (!m.active || m.progress >= m.total) {
            m.active = false;
            addLog(d, 'system', '⛏️ 自动挖掘完成！共获得 ' + (m.results ? m.results.length : 0) + ' 个碎片');
            saveData(d);
            renderAutoMine(d);
            renderStats(d);
            return;
        }

        // Get fresh scan (some servers may have been repaired)
        var currentBroken = scanBrokenServers(d);
        if (m.progress < currentBroken.length) {
            var target = currentBroken[m.progress];
            var fragment = generateMineFragment(target.server, target.cluster, d);
            if (!m.results) m.results = [];
            m.results.push(fragment);
            target.server._minedThisSession = true;
        }

        m.progress++;
        saveData(d);
        renderAutoMine(d);

        if (m.active) {
            var delay = 80 + Math.random() * 160;
            setTimeout(mineNext, delay);
        }
    }

    setTimeout(mineNext, 200);
}

/**
 * 停止自动挖掘
 */
function stopAutoMining() {
    var data = loadData();
    data.mineState.active = false;
    addLog(data, 'system', '⛏️ 自动挖掘已停止（进度 ' + data.mineState.progress + '/' + data.mineState.total + '）');
    saveData(data);
    renderAutoMine(data);
}

/**
 * 一键上架暗网：将本轮碎片写入 localStorage，供 darknet-market.html 读取
 */
function uploadFragmentsToDarknet() {
    var data = loadData();
    var ms = data.mineState;
    if (!ms.results || ms.results.length === 0) {
        alert('本轮没有挖掘到碎片！');
        return;
    }

    // Serialize fragments to localStorage
    try {
        var existing = JSON.parse(localStorage.getItem(DARKNET_PENDING_KEY) || '[]');
        if (!Array.isArray(existing)) existing = [];
        var count = ms.results.length;
        existing = existing.concat(ms.results);
        localStorage.setItem(DARKNET_PENDING_KEY, JSON.stringify(existing));

        addLog(data, 'system', '📤 已将 ' + count + ' 个碎片上架至暗网（总计 ₿' + ms.results.reduce(function(s,r){return s+r.valueBTC;},0).toFixed(3) + '）');
        ms.results = [];
        saveData(data);
        renderAutoMine(data);
        renderStats(data);

        alert('已成功上架 ' + count + ' 个碎片到暗网市场！\n请在 darknet-market.html → 出售 → 自动挖掘碎片出售 中完成售卖。');
    } catch(e) {
        alert('上架失败：' + e.message);
    }
}

// ====== BTC 余额读取 ======
function getBTCBalance() {
    try {
        var invSt = JSON.parse(localStorage.getItem('investSimState_v13'));
        if (!invSt || !invSt.assets) return 0;
        var crypto = invSt.assets.find(function(a){return a.id === 'crypto';});
        return crypto ? (crypto.holding || 0) : 0;
    } catch(e) { return 0; }
}

/**
 * 从 investSimState_v13 扣减 BTC
 */
function deductBTC(amount) {
    try {
        var invSt = JSON.parse(localStorage.getItem('investSimState_v13'));
        if (!invSt || !invSt.assets) return false;
        var crypto = invSt.assets.find(function(a){return a.id === 'crypto';});
        if (!crypto || crypto.holding < amount) return false;
        crypto.holding -= amount;
        localStorage.setItem('investSimState_v13', JSON.stringify(invSt));
        return true;
    } catch(e) { return false; }
}
